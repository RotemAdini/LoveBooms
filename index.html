<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>פצצות אהבה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#08020d;--bg2:#1a0624;--txt:#fff;--muted:rgba(255,255,255,.76);--pink:#ff2f93;--pink2:#e90066;--hot:#ff4fb1;--violet:#9d5cff;--gold:#ffd166;--line:rgba(255,255,255,.2);--danger:#ff4f68;--glass:rgba(38,10,50,.54)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:Heebo,sans-serif}
button,input,select{font-family:inherit}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:radial-gradient(ellipse at 50% -8%,rgba(255,47,147,.32),transparent 42%),radial-gradient(ellipse at 18% 18%,rgba(255,82,168,.22),transparent 30%),radial-gradient(ellipse at 82% 78%,rgba(123,61,255,.18),transparent 34%),linear-gradient(180deg,#120018 0%,#07020d 48%,#120018 100%)}
.bg:before{content:"❤  ❤  ❤  ❤";position:absolute;inset:auto 0 4dvh 0;text-align:center;white-space:pre;word-spacing:16vw;color:rgba(255,47,147,.28);font-size:clamp(28px,8vw,62px);text-shadow:0 0 26px rgba(255,47,147,.65);filter:blur(.2px);animation:floatHearts 8s ease-in-out infinite alternate;pointer-events:none}
.bg:after{content:"";position:absolute;inset:0;opacity:.72;background:radial-gradient(circle at 12% 22%,#ff9d4d 0 2px,transparent 4px),radial-gradient(circle at 82% 12%,#ffb650 0 2px,transparent 4px),radial-gradient(circle at 72% 44%,#ff4fb1 0 1px,transparent 3px),radial-gradient(circle at 18% 75%,#ff6ec0 0 1px,transparent 3px),radial-gradient(circle at 92% 86%,#ffd166 0 1px,transparent 3px);animation:sparkDrift 7s linear infinite;pointer-events:none}
@keyframes floatHearts{from{transform:translateY(0) scale(1);opacity:.38}to{transform:translateY(-18px) scale(1.035);opacity:.7}}
@keyframes sparkDrift{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.screen{position:fixed;inset:0;display:none;z-index:2}.show{display:flex}
#start{align-items:center;justify-content:center;padding:18px;overflow:auto;overflow-x:hidden}
.card{width:calc(100vw - 32px);max-width:560px;min-width:0;margin-inline:auto;overflow:hidden;border:1px solid rgba(255,79,177,.42);border-radius:30px;padding:20px;background:linear-gradient(160deg,rgba(80,22,93,.5),rgba(22,5,32,.72));backdrop-filter:blur(22px);box-shadow:0 28px 80px rgba(0,0,0,.7),0 0 38px rgba(255,47,147,.22),inset 0 1px 0 rgba(255,255,255,.12)}
h1{margin:0 0 8px;text-align:center;font-size:clamp(42px,12vw,74px);font-weight:900;line-height:.96;color:#fff;background:linear-gradient(180deg,#fff 4%,#ffe5f4 38%,#ff5ab4 58%,#ff2f93 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 22px rgba(255,47,147,.85),0 7px 22px rgba(0,0,0,.55);letter-spacing:0}
.lead{margin:8px auto 18px;max-width:430px;text-align:center;color:rgba(255,255,255,.84);font-size:15px;line-height:1.55;text-shadow:0 0 12px rgba(255,47,147,.25)}
.last-win{display:none;margin:0 0 12px;text-align:center;padding:8px 12px;border:1px solid rgba(255,209,102,.48);border-radius:16px;background:rgba(255,209,102,.12);color:#ffd166;font-size:12px;font-weight:900;box-shadow:0 0 18px rgba(255,209,102,.16)}
.start-step{display:grid;gap:10px}
.start-step:before{content:"🏆";justify-self:center;font-size:40px;line-height:1;filter:drop-shadow(0 0 18px rgba(255,209,102,.65));margin-bottom:-2px}
.start-step.hide{display:none}
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.g2>div{min-width:0}
label{display:block;color:#ff72bd;font-size:12px;font-weight:900;margin:8px 0 5px;text-shadow:0 0 10px rgba(255,47,147,.25)}
input,select{width:100%;min-width:0;padding:12px;border-radius:15px;border:1px solid rgba(255,79,177,.54);background:rgba(8,2,13,.4);color:#fff;box-shadow:inset 0 0 18px rgba(255,47,147,.08),0 0 14px rgba(255,47,147,.08);outline:none}
input:focus,select:focus{border-color:#ff66bf;box-shadow:0 0 18px rgba(255,47,147,.38),inset 0 0 18px rgba(255,47,147,.12)}
.drink{display:grid;gap:6px;margin-top:12px;padding:12px;border:1px solid rgba(255,79,177,.34);border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.025));color:var(--muted);font-size:12px;font-weight:900;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.eg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.emoji{min-width:0;height:48px;border:1px solid rgba(255,255,255,.22);border-radius:15px;background:linear-gradient(150deg,rgba(255,255,255,.1),rgba(255,255,255,.025));color:#fff;font-size:25px;box-shadow:inset 0 0 14px rgba(255,255,255,.04);transition:transform .12s ease,border-color .18s ease,box-shadow .18s ease}
.emoji:active{transform:scale(.96)}
.emoji.sel{border-color:#ff5ab4;background:linear-gradient(145deg,rgba(255,47,147,.62),rgba(255,47,147,.18));box-shadow:0 0 22px rgba(255,47,147,.44),inset 0 0 16px rgba(255,255,255,.14)}
.main{width:100%;margin-top:16px;border:none;border-radius:999px;padding:16px;color:#fff;font-weight:900;font-size:22px;background:linear-gradient(180deg,#ff3aa0,#e80068);box-shadow:0 16px 38px rgba(255,47,147,.44),0 0 26px rgba(255,47,147,.45),inset 0 1px 0 rgba(255,255,255,.35);border:1px solid rgba(255,161,211,.55);transition:transform .12s ease,filter .18s ease}
.main:active{transform:scale(.98);filter:brightness(1.08)}

#game{padding:8px max(8px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left))}
.wrap{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:8px}
.top{display:grid;gap:7px}
.head{display:grid;grid-template-columns:36px 1fr 36px;align-items:center}
.set{width:36px;height:36px;border-radius:13px;border:1px solid rgba(255,79,177,.66);background:linear-gradient(145deg,rgba(255,47,147,.26),rgba(15,4,22,.86));color:#fff;font-size:18px;box-shadow:0 0 20px rgba(255,47,147,.28),inset 0 1px 0 rgba(255,255,255,.16)}
.title{text-align:center;font-weight:900;font-size:clamp(22px,6vw,36px);line-height:1;color:#fff;background:linear-gradient(180deg,#fff,#ffcee9 45%,#ff40a1 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 18px rgba(255,47,147,.7)}
.players{display:grid;grid-template-columns:minmax(0,1fr) 34px minmax(0,1fr);gap:8px;align-items:center}
.players>div:nth-child(2){font-weight:900;color:#ff72bd;text-align:center;text-shadow:0 0 15px rgba(255,47,147,.6)}
.pc{min-height:38px;border:1px solid rgba(255,79,177,.38);border-radius:18px;display:grid;grid-template-columns:auto minmax(0,1fr) auto;justify-content:center;align-items:center;gap:7px;background:linear-gradient(150deg,rgba(255,255,255,.1),rgba(255,255,255,.025));font-weight:900;font-size:13px;position:relative;padding:6px 9px;min-width:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 8px 20px rgba(0,0,0,.22)}
.pc.a{border-color:#ff4fb1;background:linear-gradient(145deg,rgba(255,47,147,.23),rgba(35,5,45,.56));box-shadow:0 0 22px rgba(255,47,147,.34),inset 0 1px 0 rgba(255,255,255,.14)}
.pname{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wins{flex:0 0 auto;min-width:24px;padding:2px 7px;border-radius:999px;border:1px solid rgba(255,209,102,.5);background:rgba(255,209,102,.13);color:#ffd166;font-size:11px;line-height:1.35;text-align:center;box-shadow:0 0 12px rgba(255,209,102,.14)}
.fx{position:absolute;bottom:2px;left:4px;display:flex;gap:3px;font-size:10px;opacity:.92}
.turn{text-align:center;padding:8px 12px;border:1px solid rgba(255,79,177,.58);border-radius:999px;background:linear-gradient(90deg,rgba(255,47,147,.08),rgba(255,47,147,.28),rgba(255,47,147,.08));font-weight:900;font-size:16px;line-height:1.2;position:relative;overflow:hidden;box-shadow:0 0 22px rgba(255,47,147,.25),inset 0 0 18px rgba(255,47,147,.08);text-shadow:0 0 14px rgba(255,255,255,.2)}
.turn:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);transform:translateX(-120%);animation:turnShine 4.8s ease-in-out infinite}
@keyframes turnShine{0%,68%{transform:translateX(-120%)}100%{transform:translateX(120%)}}
.turn.endgame{border-color:#ff4f68;background:rgba(255,79,104,.2);box-shadow:0 0 22px rgba(255,79,104,.4)}
.turn.endgame:after{content:"מצב סיום";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#ffd166}

.board-wrap{display:flex;justify-content:center;align-items:center;min-height:0;position:relative}
.board{width:min(97vw,560px);height:min(72dvh,760px);display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(8,1fr);gap:5px;padding:8px;border-radius:24px;border:1px solid rgba(255,79,177,.78);background:linear-gradient(155deg,rgba(255,255,255,.11),rgba(255,255,255,.025)),rgba(21,5,31,.72);box-shadow:0 0 40px rgba(255,47,147,.34),0 18px 52px rgba(0,0,0,.58),inset 0 0 30px rgba(255,79,177,.08),inset 0 1px 0 rgba(255,255,255,.14);transition:box-shadow .35s,border-color .35s;position:relative;direction:ltr}
.board:before{content:"";position:absolute;inset:-2px;border-radius:26px;border:1px solid rgba(255,86,188,.38);box-shadow:0 0 24px rgba(255,47,147,.38);pointer-events:none}
.board.endgame{border-color:#ff4f68;box-shadow:0 0 42px rgba(255,79,104,.44),inset 0 0 28px rgba(255,79,104,.12);animation:boardPulse 1.6s ease-in-out infinite}
@keyframes boardPulse{0%,100%{filter:saturate(1)}50%{filter:saturate(1.14)}}
.board.endgame .goal{animation:trophyPulse 1.1s ease-in-out infinite}
@keyframes trophyPulse{0%,100%{box-shadow:0 0 12px rgba(255,209,102,.45)}50%{box-shadow:0 0 24px rgba(255,209,102,.75)}}
.board.fog:before{content:"";position:absolute;inset:0;border-radius:20px;pointer-events:none;background:radial-gradient(circle at 50% 50%,rgba(255,90,120,.25),transparent 60%);animation:fog .75s ease}
@keyframes fog{from{opacity:0}20%{opacity:1}to{opacity:0}}

.cell{position:relative;border-radius:15px;border:1px solid rgba(255,167,221,.34);display:flex;justify-content:center;align-items:center;background:linear-gradient(145deg,rgba(105,50,115,.62),rgba(27,8,38,.88));overflow:hidden;transition:transform .25s ease, box-shadow .25s ease,border-color .25s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),inset 0 -14px 28px rgba(0,0,0,.18)}
.cell:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent 58%);opacity:.8}
.cell.glow{box-shadow:0 0 24px rgba(255,255,255,.35),inset 0 1px 0 rgba(255,255,255,.2);transform:scale(1.045)}
.cell.flip{animation:tileReveal .44s cubic-bezier(.22,.7,.22,1)}
@keyframes tileReveal{0%{transform:scale(1) rotateY(0);filter:brightness(1)}45%{transform:scale(.9) rotateY(88deg);filter:brightness(1.35)}70%{transform:scale(1.06) rotateY(0);filter:brightness(1.22)}100%{transform:scale(1);filter:brightness(1)}}
.cell.start{border-color:#46a3ff;background:linear-gradient(145deg,rgba(35,92,184,.58),rgba(8,18,48,.9));box-shadow:0 0 24px rgba(70,163,255,.55),inset 0 0 20px rgba(70,163,255,.18)}
.cell.goal{border-color:#ffd166;background:linear-gradient(145deg,rgba(117,72,0,.72),rgba(40,19,0,.92));box-shadow:0 0 28px rgba(255,209,102,.68),inset 0 0 22px rgba(255,209,102,.22)}
.cell.seen.kiss{border-color:#ff2f93;background:linear-gradient(145deg,#982261,#311120);box-shadow:0 0 22px rgba(255,47,147,.58),inset 0 0 18px rgba(255,47,147,.12)}
.cell.seen.task{border-color:#ff9d2e;background:linear-gradient(145deg,#85440c,#2b1306);box-shadow:0 0 21px rgba(255,157,46,.54),inset 0 0 18px rgba(255,157,46,.12)}
.cell.seen.question{border-color:#ff64bd;background:linear-gradient(145deg,#81336e,#251027);box-shadow:0 0 21px rgba(255,100,189,.54),inset 0 0 18px rgba(255,100,189,.12)}
.cell.seen.temptation{border-color:#43a7ff;background:linear-gradient(145deg,#075c8c,#05172a);box-shadow:0 0 21px rgba(67,167,255,.58),inset 0 0 18px rgba(67,167,255,.12)}
.cell.seen.duel{border-color:#b46cff;background:linear-gradient(145deg,#5d2586,#1b0c2c);box-shadow:0 0 21px rgba(180,108,255,.58),inset 0 0 18px rgba(180,108,255,.12)}
.cell.seen.drink{border-color:#58e76f;background:linear-gradient(145deg,#146b31,#071f13);box-shadow:0 0 21px rgba(88,231,111,.54),inset 0 0 18px rgba(88,231,111,.12)}
.cell.seen.empty{border-color:#b9bbca;background:linear-gradient(145deg,#41414f,#181824);box-shadow:0 0 17px rgba(185,187,202,.32),inset 0 0 16px rgba(255,255,255,.06)}
.cell.seen.bomb{border-color:#ff4f68;background:linear-gradient(145deg,#8f1f30,#2a0710);box-shadow:0 0 24px rgba(255,79,104,.68),inset 0 0 18px rgba(255,79,104,.14)}
.icon{font-size:clamp(21px,5vw,31px);z-index:1;filter:drop-shadow(0 0 8px rgba(255,255,255,.28))}
.badge{position:absolute;z-index:2;font-size:8px;padding:2px 4px;border-radius:7px;font-weight:900}
.start .badge{left:4px;bottom:4px;background:#46a3ff;color:#fff;box-shadow:0 0 12px rgba(70,163,255,.7)}
.goal .badge{right:4px;top:4px;background:#ffd166;color:#111;box-shadow:0 0 14px rgba(255,209,102,.8)}
.preview{position:absolute;z-index:5;font-size:30px;animation:popIn .36s ease}
@keyframes popIn{from{transform:scale(.45);opacity:0;filter:blur(2px)}70%{transform:scale(1.18);opacity:1}to{transform:scale(1);opacity:1}}

.layer{position:absolute;inset:8px;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(8,1fr);pointer-events:none;direction:ltr}
.tk{position:absolute;z-index:9;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.48);transform:translate(-50%,-50%);transition:left .28s cubic-bezier(.22,.61,.36,1),top .28s cubic-bezier(.22,.61,.36,1),transform .16s ease,filter .18s;box-shadow:0 0 18px rgba(255,47,147,.44),inset 0 1px 0 rgba(255,255,255,.18)}
.tk.land{transform:translate(-50%,-50%) scale(1.15)}
.tk.warp{filter:brightness(2) saturate(1.4);transform:translate(-50%,-50%) scale(.7)}

.moves{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:min(88vw,470px);margin:0 auto}
.mv{height:54px;border-radius:50%;border:1px solid rgba(255,118,199,.76);background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.26),transparent 26%),linear-gradient(145deg,rgba(92,18,69,.92),rgba(20,5,28,.96));color:#ffd2ec;font-size:31px;font-weight:900;transition:transform .1s,box-shadow .18s,filter .18s;box-shadow:0 0 22px rgba(255,47,147,.42),inset 0 0 18px rgba(255,47,147,.12)}
.mv:active{transform:scale(.94);filter:brightness(1.18)}
.mv:disabled{opacity:.34;box-shadow:inset 0 0 10px rgba(255,255,255,.04)}

.modal{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;padding:12px;background:rgba(5,0,9,.82);backdrop-filter:blur(10px)}
.modal.show{display:flex}
.mc{width:calc(100vw - 24px);max-width:420px;max-height:88dvh;overflow:auto;border:1px solid rgba(255,79,177,.38);border-radius:25px;padding:16px;text-align:center;background:linear-gradient(170deg,rgba(58,19,74,.94),rgba(15,5,24,.98));box-shadow:0 28px 80px rgba(0,0,0,.76),0 0 30px rgba(255,47,147,.22),inset 0 1px 0 rgba(255,255,255,.12);animation:pop .2s ease}
@keyframes pop{from{transform:scale(.94);opacity:.45}to{transform:scale(1);opacity:1}}
.mi{font-size:52px;animation:shine 1.2s ease infinite alternate}
@keyframes shine{from{filter:drop-shadow(0 0 2px rgba(255,255,255,.2))}to{filter:drop-shadow(0 0 14px rgba(255,209,102,.45))}}
.mt{font-size:21px;font-weight:900;margin:5px 0}
.mx{white-space:pre-line;line-height:1.55;color:rgba(255,255,255,.92);font-size:14px}
.ma{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.mb{border:1px solid rgba(255,154,211,.42);border-radius:999px;padding:12px;min-height:44px;color:#fff;font-weight:900;line-height:1.25;white-space:normal;overflow-wrap:break-word;background:linear-gradient(180deg,#ff3aa0,#e80068);box-shadow:0 10px 24px rgba(255,47,147,.28),inset 0 1px 0 rgba(255,255,255,.22)}
.mb.alt{border:1px solid var(--line);background:rgba(255,255,255,.12)}
.mb.good{background:linear-gradient(130deg,#00c777,#00aa62)}
.mb.bad{background:linear-gradient(130deg,#ff5a6e,#ff3450)}
.timer-box{display:grid;gap:6px;margin:10px 0 2px}
.timer-btn{border:1px solid rgba(255,209,102,.45);border-radius:999px;padding:9px 12px;background:rgba(255,209,102,.12);color:#ffd166;font-weight:900}
.timer-display{font-size:28px;font-weight:900;color:#ffd166;text-shadow:0 0 14px rgba(255,209,102,.35)}

.emoji-task{margin-top:10px;padding:9px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06)}
.emoji-picked{min-height:30px;margin-bottom:8px;font-size:24px;font-weight:900;color:#ffd166}
.emoji-mini{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.emoji-mini button{height:32px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.08);color:#fff;font-size:18px}
.emoji-mini button.sel{border-color:var(--gold);background:rgba(255,209,102,.22)}
.impact{animation:impact .22s ease}
@keyframes impact{0%{transform:scale(1)}50%{transform:scale(1.09)}100%{transform:scale(1)}}

.shake{animation:sh .45s}
@keyframes sh{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.cf{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:24}
.c{position:absolute;top:-22px;width:10px;height:14px;animation:fall 2.2s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.1}}

.toast-wrap{position:fixed;z-index:30;left:50%;bottom:calc(12px + env(safe-area-inset-bottom));transform:translateX(-50%);display:grid;gap:6px;pointer-events:none}
.toast{max-width:88vw;padding:10px 14px;border-radius:15px;border:1px solid rgba(255,79,177,.34);background:rgba(21,5,31,.92);font-size:13px;font-weight:900;text-align:center;white-space:pre-line;animation:toast .2s ease;box-shadow:0 12px 28px rgba(0,0,0,.38),0 0 18px rgba(255,47,147,.16)}
@keyframes toast{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.warn{border-color:rgba(255,209,102,.55)}.toast.danger{border-color:rgba(255,79,104,.65)}
.trophy-big{font-size:78px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.08)}}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.stat{padding:8px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.08);font-size:12px}
.debug-panel{position:fixed;z-index:18;top:8px;right:8px;display:none;width:min(300px,calc(100vw - 16px));gap:6px;padding:10px;border:1px solid rgba(255,209,102,.55);border-radius:14px;background:rgba(14,8,24,.94);box-shadow:0 14px 40px rgba(0,0,0,.45);font-size:12px}
.debug-panel.show{display:grid}
.debug-title{font-weight:900;color:#ffd166;text-align:center}
.debug-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.debug-panel button,.debug-panel select,.debug-panel input{min-height:32px;border-radius:9px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:#fff;font-size:12px;font-weight:800}
.debug-panel input{text-align:center}
.debug-panel button{padding:6px}
.debug-panel .danger{border-color:rgba(255,79,104,.7);background:rgba(255,79,104,.18)}

@media(max-width:390px){#game{padding:6px 6px calc(6px + env(safe-area-inset-bottom))}.board{height:min(70dvh,650px);gap:4px;padding:6px;border-radius:21px}.layer{inset:6px}.cell{border-radius:12px}.pc{min-height:36px;font-size:12px;padding:5px 7px}.wins{font-size:10px;min-width:22px;padding:1px 5px}.moves{gap:9px}.mv{height:48px;font-size:28px}.mt{font-size:19px}.mx{font-size:13px}.timer-display{font-size:24px}}
@media(max-width:760px){#start{align-items:flex-start}.card{padding:16px}#start .g2:not(.emoji-row){grid-template-columns:1fr}}

function openSuccessFail(){clearTimer();const player=S.pending?.player??actorIndex(),x=`${S.players[player].name}, מה הייתה התוצאה?`;S.modalState={i:"❓",t:"תוצאת אתגר הסיכון",x,actions:[{t:"הצלחתי",k:"succ",kindClass:"good"},{t:"לא הצלחתי",k:"fail",kindClass:"bad"}],adv:false,opt:{}};$("mi").textContent="❓";$("mt").textContent="תוצאת אתגר הסיכון";$("mx").textContent=x;const ma=$("ma");ma.innerHTML="";ma.style.gridTemplateColumns="1fr 1fr";const s=document.createElement("button"),f=document.createElement("button");s.className="mb good";f.className="mb bad";s.textContent="הצלחתי";f.textContent="לא הצלחתי";s.onclick=()=>act("succ",S.modalVersion);f.onclick=()=>act("fail",S.modalVersion);ma.appendChild(s);ma.appendChild(f);saveGame()}
function applyTemptOutcome(x,success){const player=x.player,steps=1,kind=success?"forward":"back",w=W[S.players[player].gender]||W.f;startManualMove(player,steps,kind,`${success?"אתגר הסיכון הצליח: +1 צעד":"אתגר הסיכון נכשל: -1 צעד"}. ${w.choose} ${manualStepText(steps)}.`)}
function microTitle(){const a=S.stats.bombs<3?"שורדי הפצצות":"מכורי הסיכון",b=S.stats.duels>6?"אלופי הדו-קרב":"כוכבי הפלרטוט";return`${a} • ${b}`}
function confetti(){const f=$("confetti");f.innerHTML="";for(let i=0;i<110;i++){const d=document.createElement("div");d.className="c";d.style.left=Math.random()*100+"vw";d.style.background=["#ff2f7d","#ffd166","#46a3ff","#8cff8c","#fff"][Math.floor(Math.random()*5)];d.style.animationDelay=(Math.random()*.5)+"s";f.appendChild(d)}setTimeout(()=>f.innerHTML="",2500)}
function winScreen(w){
  const idx=Math.max(0,S.players.indexOf(w));
  const rec=recordWin(w.name);
  w.wins=rec.total;
  clearSavedGame();
  try{localStorage.setItem("boomLastWinner",w.name)}catch(_e){}
  const funny = pickText("victory",idx);
  const title=microTitle();
  recordHistory(w,title);
  const stats = `<div class="stats"><div class="stat">תורים: ${S.turn}</div><div class="stat">פצצות: ${S.stats.bombs}</div><div class="stat">דו־קרבות: ${S.stats.duels}</div><div class="stat">סיכונים: ${S.stats.risks}</div><div class="stat">שתייה: ${S.stats.drinks||0}</div><div class="stat">ריקות: ${S.stats.empty||0}</div></div>`;

  pop(
    "",
    `ניצחון גדול!`,
    `<div class="trophy-big">🏆</div>${w.name}<br>ניצחונות לכל החיים: ${rec.total}<br>תואר: ${title}<br>${funny}${stats}`,
    [{t:"Send Feedback",k:"feedback"},{t:"New Game",k:"newGame"}],
    false
  );

  Audio.play("win");
  confetti();
}
async function resolvePending(k){
  const x=S.pending;
  if(!x)return false;
  if(x.k==="timed_intro"&&k==="timedStart"){showTimedChallenge(x);return true}
  if(x.k==="timed_active"){
    if(k==="timedDone"){S.pending=null;Audio.play("good");return false}
    if(k==="timedFail"){S.pending=null;Audio.play("bad");await penaltyBackOne(x.player);return true}
  }
  if(x.k==="tempt"){
    if(k==="safe"){S.pending=null;toast("🙂 לא לקחת סיכון — ממשיכים",1000);Audio.play("tap");return false}
    if(k==="risk"){
      const sec=timerSeconds(x.d.c);
      if(sec){S.pending={k:"tempt_timed_intro",d:x.d,player:x.player,sec};S.actor=x.player;pop("⏳","אתגר זמן",timedIntroText(x.player),[{t:"התחל",k:"timedStart"}],false);return true}
      S.pending={k:"tempt2",d:x.d,player:x.player};openSuccessFail();return true
    }
  }
  if(x.k==="tempt_timed_intro"&&k==="timedStart"){
    S.pending={k:"tempt_timed_active",d:x.d,player:x.player,sec:x.sec};
    S.actor=x.player;
    pop("❓","אתגר סיכון בזמן",`${fmt(x.d.c,x.player)}\n\nהצלחה: +1 צעד\nלא הצלחת? -1 צעד`,[{t:"הצלחתי",k:"succ",kindClass:"good"},{t:"לא הצלחתי",k:"timedFail",kindClass:"bad"}],false,{timerSec:x.sec,autoTimer:true});
    return true
  }
  if(x.k==="tempt_timed_active"){
    if(k==="succ"){S.pending=null;Audio.play("good");applyTemptOutcome(x,true);return true}
    if(k==="timedFail"||k==="fail"){const w=W[S.players[x.player].gender]||W.f;S.pending=null;Audio.play("bad");await penaltyBackOne(x.player,`${S.players[x.player].name} ${w.fail} באתגר: ${w.return} צעד אחד בלי להפעיל קובייה`);return true}
  }
  if(x.k==="tempt2"){
    const succ=k==="succ";
    Audio.play(succ?"good":"bad");
    S.pending=null;
    applyTemptOutcome(x,succ);
    return true
  }
  if(x.k==="duel_intro"&&k==="duelStart"){showDuelChallenge(x);return true}
  if(x.k==="duel_result"&&k.startsWith("duelWin")){
    const w=+k.slice(-1),words=W[S.players[w].gender]||W.f;
    S.pending=null;
    Audio.play("good");
    startManualMove(w,1,"forward",`${S.players[w].name} ${words.win} בדו־קרב ⚔️ — ${words.choose} צעד פרס אחד ידנית. פצצה בדרך מופעלת כרגיל.`);
    return true
  }
  return false
}
function sendFeedback(){try{location.href=FEEDBACK_URL}catch(_e){toast("אפשר לשלוח פידבק ל-feedback@example.com",1500,"warn")}}
function showHowToPlay(){
  pop("ℹ️","How to Play","💣 Bomb = return to start\n🎯 Task = perform the task\n❔ Question = answer the question\n⚔️ Duel = winner gets 1 bonus step\n❓ Risk Challenge = success = +1 step, failure = -1 step\n🥂 Drink = follow the drinking instruction\n⬜ Empty = nothing happens\n🏆 Trophy = win the game",[{t:"Return to Game",k:"resume"}],false)
}
function showSymbols(){
  pop("🧭","Board Symbols Explanation",`START = נקודת התחלה\n🏆 = גביע וניצחון\n💣 = פצצה וחזרה להתחלה\n💋 = אינטימיות\n🎯 = משימה\n❔ = שאלה\n❓ = אתגר סיכון\n⚔️ = דו־קרב\n🥂 = שתייה במצבי Light/Wild Drinking\n⬜ = קובייה ריקה`,[{t:"Return to Game",k:"resume"}],false)
}
function showLeaderboard(){
  const rows=leaderboardEntries(),html=rows.length?rows.slice(0,10).map((x,i)=>`${i+1}. ${x.name} — ${x.wins}`).join("\n"):"עדיין אין ניצחונות שמורים.";
  pop("🏆","Leaderboard",html,[{t:"Return to Game",k:"resume"}],false)
}
function showGameHistory(){
  const rows=readHistory(),html=rows.length?rows.slice(0,8).map(x=>`${x.date} — ניצחון של ${x.winner} ב-${x.turn} תורים (${x.title||"ללא תואר"})`).join("\n"):"עדיין אין היסטוריית משחקים.";
  pop("📜","Game History",html,[{t:"Return to Game",k:"resume"}],false)
}
async function applyModalAction(k,v){
  if(v!==S.modalVersion)return;
  if(k==="restart"){clearSavedGame();location.reload();return}
  if(k==="continueSaved"){if(!restoreSavedGame())toast("לא ניתן לטעון את המשחק השמור",1400,"danger");return}
  if(k==="discardSaved"){clearSavedGame();closeModal();return}
  if(k==="mute"){Audio.setMuted(!Audio.muted);toast(Audio.muted?"🔇 סאונד הושתק":"🔈 סאונד הופעל",900);closeModal();S.busy=false;updateMoveButtons();return}
  if(k==="resetWins"){resetWins();toast("סטטיסטיקת הניצחונות אופסה",1200,"warn");closeModal();S.busy=false;updateMoveButtons();return}
  if(k==="help"||k==="howToPlay"){showHowToPlay();return}
  if(k==="symbols"){showSymbols();return}
  if(k==="leaderboard"){showLeaderboard();return}
  if(k==="gameHistory"){showGameHistory();return}
  if(k==="feedback"){sendFeedback();if(S.over){[...$("ma").querySelectorAll("button")].forEach(b=>b.disabled=false);return}closeModal();S.busy=false;updateMoveButtons();return}
  if(k==="newGame"){clearSavedGame();location.reload();return}
  if(k==="resume"){closeModal();S.busy=false;updateMoveButtons();return}
  let opened=false;
  if(S.pending)opened=await resolvePending(k);
  if(opened)return;
  if(S.over)return;
  closeModal();
  if(S.advance)nextTurn();
  updateMoveButtons()
}
function applyDebugForce(nr,nc){
  if(!S.debug||!S.debugForce)return[nr,nc];
  const forced=S.debugForce;
  S.debugForce=null;
  if(forced==="goal"){toast("DEBUG: הצעד הבא הועבר לגביע",900,"warn");return[GOAL[0],GOAL[1]]}
  const cell=S.board[nr]?.[nc];
  if(cell&&!(nr===START[0]&&nc===START[1])&&!(nr===GOAL[0]&&nc===GOAL[1])){
    cell.type=forced;
    cell.reveal=false;
    paint(cell);
    toast(`DEBUG: הקובייה הבאה היא ${forced}`,900,"warn");
  }
  return[nr,nc]
}
async function moveTurn(dr,dc){
  if(S.busy||S.over||modal.classList.contains("show"))return;
  const manual=S.manualMove,me=manual?manual.player:S.cur,p=S.players[me];
  let nr=p.pos[0]+dr,nc=p.pos[1]+dc;
  if(!canMove(me,dr,dc))return;
  [nr,nc]=applyDebugForce(nr,nc);
  S.busy=true;
  updateMoveButtons();
  p.pos=[nr,nc];
  await animateToken(me,nr,nc);
  stackTokens();
  if(checkVictory(me)){S.manualMove=null;S.busy=false;updateMoveButtons();return}
  const cell=S.board[nr][nc];
  if(manual){
    manual.remaining--;
    if(cell.type==="bomb"){S.manualMove=null;await tileRevealFlow(cell,me);S.busy=false;ui();return}
    if(manual.remaining>0){
      S.busy=false;
      if(!hasManualMoves()){toast("אין עוד צעדים זמינים — התנועה הסתיימה",1100);S.manualMove=null;nextTurn()}else{ui();saveGame()}
      return
    }
    S.manualMove=null;
    await tileRevealFlow(cell,me);
    S.busy=false;
    ui();saveGame();
    return
  }
  await tileRevealFlow(cell,me);
  S.busy=false;
  ui();saveGame()
}
function nextTurn(){S.cur=1-S.cur;S.turn++;ui();saveGame()}
function restoreSavedGame(data=readSavedGame()){
  if(!data||!Array.isArray(data.players)||data.players.length!==2)return false;
  clearTimer();modal.classList.remove("show");
  S.players=data.players.map((p,i)=>({name:p.name||`שחקן ${i+1}`,gender:p.gender==="m"?"m":"f",emoji:p.emoji||EM[i],pos:Array.isArray(p.pos)?p.pos:[...START],wins:getWins(p.name)}));
  S.cur=data.cur===1?1:0;S.turn=Math.max(1,+data.turn||1);S.busy=false;S.over=false;S.pending=data.pending||null;S.advance=!!data.advance;S.manualMove=data.manualMove||null;S.actor=Number.isInteger(data.actor)?data.actor:null;S.history=data.history||{kiss:[],task:[],question:[],duel:[],tempt:[],drink:[]};S.endgameShown=!!data.endgameShown;S.modalVersion=0;S.drinkMode=data.drinkMode||"none";S.drink=S.drinkMode!=="none";S.stats=Object.assign({bombs:0,duels:0,risks:0,drinks:0,empty:0},data.stats||{});S.modalState=null;
  if(!buildBoardFromSnapshot(data.board)){clearSavedGame();return false}
  $("start").classList.remove("show");$("game").classList.add("show");ui();placeTokens();renderDebug();
  const m=data.modalState;
  if(m&&Array.isArray(m.actions)&&m.actions.length)pop(m.i,m.t,m.x,m.actions,m.adv,m.opt||{});else toast("המשחק שוחזר",1000,"warn");
  saveGame();
  return true
}
function startGame(){
  if($("game").classList.contains("show"))return;
  clearSavedGame();
  const n1=$("n1").value.trim()||"שחקן א",n2=$("n2").value.trim()||"שחקן ב";
  S.players=[{name:n1,gender:$("g1").value,emoji:S.e1,pos:[...START],wins:getWins(n1)},{name:n2,gender:$("g2").value,emoji:S.e2,pos:[...START],wins:getWins(n2)}];
  S.cur=0;S.turn=1;S.busy=false;S.over=false;S.pending=null;S.advance=false;S.manualMove=null;S.actor=null;S.history={kiss:[],task:[],question:[],duel:[],tempt:[],drink:[]};S.stats={bombs:0,duels:0,risks:0,drinks:0,empty:0};S.endgameShown=false;S.modalVersion=0;S.modalState=null;S.drinkMode=$("drinkMode").value||"none";S.drink=S.drinkMode!=="none";
  buildBoard();$("start").classList.remove("show");$("game").classList.add("show");ui();placeTokens();
  const drinkLine=S.drink?`\n🥂 שתייה — ${drinkModeLabel()} (${DRINK_COUNTS[S.drinkMode]} קוביות)`: "";
  pop("💘","מתחילים",`💋 אינטימיות\n🎯 משימה\n❔ שאלה\n❓ אתגר סיכון\n⚔️ דו־קרב\n💣 פצצה${drinkLine}\n⬜ קובייה ריקה\n\nמשימות עם זמן ייפתחו במסך הסבר ורק אז הטיימר יתחיל. כל משימה היא הזמנה בלבד; אם לא מתאים לבצע משהו, לחצו על כפתור התוצאה המתאים והמשיכו.`,[{t:"הבנתי",k:"resume"}],false)
}
function openSettings(){if(S.busy){toast("רגע, פעולה עדיין מתבצעת",900,"warn");return}pop("⚙️","הגדרות","",[{t:"How to Play",k:"howToPlay"},{t:"Board Symbols Explanation",k:"symbols"},{t:"Leaderboard",k:"leaderboard"},{t:"Game History",k:"gameHistory"},{t:"Send Feedback",k:"feedback"},{t:"Reset Wins",k:"resetWins",kindClass:"bad"},{t:"New Game",k:"newGame"},{t:"Return to Game",k:"resume"}],false)}
function renderDebug(){
  const p=$("debugPanel");
  if(!p)return;
  p.classList.toggle("show",S.debug);
  if(S.players.length){
    $("dbgPlayer").innerHTML=S.players.map((x,i)=>`<option value="${i}">${i+1}. ${x.name}</option>`).join("");
  }
}
function debugTitleTap(){
  const now=Date.now();
  S.debugTaps=S.debugTaps.filter(t=>now-t<850);
  S.debugTaps.push(now);
  if(S.debugTaps.length>=3){
    S.debug=true;
    S.debugTaps=[];
    renderDebug();
    toast("DEBUG הופעל",900,"warn");
  }
}
function debugSetForce(type){if(!S.debug)return;S.debugForce=type;toast(`DEBUG: הקובייה הבאה תוגדר כ-${type}`,1100,"warn")}
function debugRevealBoard(){
  if(!S.debug||!S.board.length)return;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){S.board[r][c].reveal=true;paint(S.board[r][c])}
  toast("DEBUG: הלוח נחשף",900,"warn")
}
function clampNum(v,min,max){v=Number(v);return Number.isFinite(v)?Math.max(min,Math.min(max,Math.round(v))):min}
function debugMovePlayer(){
  if(!S.debug||!S.players.length||!S.board.length)return;
  const i=clampNum($("dbgPlayer").value,0,S.players.length-1),r=clampNum($("dbgR").value,0,ROWS-1),c=clampNum($("dbgC").value,0,COLS-1);
  S.manualMove=null;
  S.actor=null;
  S.players[i].pos=[r,c];
  placeTokens();
  if(checkVictory(i))return;
  ui();
  saveGame();
  toast(`DEBUG: המיקום של ${S.players[i].name} עודכן ל-${r},${c}`,900,"warn")
}
$("gameTitle").addEventListener("pointerdown",debugTitleTap);
$("dbgReveal").onclick=debugRevealBoard;
$("dbgBomb").onclick=()=>debugSetForce("bomb");
$("dbgDuel").onclick=()=>debugSetForce("duel");
$("dbgDrink").onclick=()=>debugSetForce("drink");
$("dbgEmpty").onclick=()=>debugSetForce("empty");
$("dbgGoal").onclick=()=>debugSetForce("goal");
$("dbgMove").onclick=debugMovePlayer;
$("dbgReset").onclick=()=>{if(S.debug)location.reload()};
$("setupBtn").onclick=showSetup;$("startBtn").onclick=startGame;$("settingsBtn").onclick=openSettings;$("u").onclick=()=>moveTurn(-1,0);$("d").onclick=()=>moveTurn(1,0);$("l").onclick=()=>moveTurn(0,-1);$("r").onclick=()=>moveTurn(0,1);
window.addEventListener("pointerdown",()=>Audio.ensure(),{once:true});
async function act(k,v){if(v!==S.modalVersion)return;[...$("ma").querySelectorAll("button")].forEach(b=>b.disabled=true);try{await applyModalAction(k,v)}catch(e){console.error(e);toast("אירעה שגיאה בפעולה. נסו שוב.",1200,"danger");[...$("ma").querySelectorAll("button")].forEach(b=>b.disabled=false)}}
</script>
