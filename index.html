<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>בום של אהבה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#09040f;--bg2:#190c29;--txt:#fff;--muted:rgba(255,255,255,.72);--pink:#ff2f7d;--pink2:#ff0066;--gold:#ffd166;--line:rgba(255,255,255,.2);--danger:#ff4f68}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:Heebo,sans-serif}
button,input,select{font-family:inherit}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 18% 12%,rgba(255,47,125,.3),transparent 35%),radial-gradient(circle at 88% 82%,rgba(95,73,255,.24),transparent 42%),linear-gradient(160deg,var(--bg),var(--bg2) 66%,#07020a)}
.screen{position:fixed;inset:0;display:none;z-index:2}.show{display:flex}
#start{align-items:center;justify-content:center;padding:10px;overflow:auto}
.card{width:min(100%,560px);border:1px solid var(--line);border-radius:24px;padding:14px;background:linear-gradient(165deg,rgba(255,255,255,.14),rgba(255,255,255,.05));backdrop-filter:blur(18px);box-shadow:0 22px 70px rgba(0,0,0,.55)}
h1{margin:0 0 6px;text-align:center;font-size:clamp(34px,9vw,52px);font-weight:900;line-height:1.05;background:linear-gradient(120deg,#fff,var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lead{margin:0 0 10px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.45}
.last-win{display:none;margin:0 0 9px;text-align:center;padding:7px 10px;border:1px solid rgba(255,209,102,.4);border-radius:13px;background:rgba(255,209,102,.1);color:#ffd166;font-size:12px;font-weight:900}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
label{display:block;color:var(--muted);font-size:11px;font-weight:700;margin:6px 0 3px}
input,select{width:100%;padding:9px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#fff}
.drink{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding:9px 11px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.07);color:var(--muted);font-size:12px;font-weight:900}
.drink input{width:22px;height:22px;accent-color:var(--pink)}
.eg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.emoji{height:34px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.08);color:#fff;font-size:19px}
.emoji.sel{border-color:transparent;background:linear-gradient(130deg,var(--pink2),var(--pink))}
.main{width:100%;margin-top:11px;border:none;border-radius:999px;padding:12px;color:#fff;font-weight:900;font-size:15px;background:linear-gradient(130deg,var(--pink2),var(--pink));box-shadow:0 12px 30px rgba(255,47,125,.35)}

#game{padding:6px}
.wrap{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:6px}
.top{display:grid;gap:5px}
.head{display:grid;grid-template-columns:36px 1fr 36px;align-items:center}
.set{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,47,125,.6);background:rgba(255,255,255,.1);color:#fff;font-size:17px}
.title{text-align:center;font-weight:900;font-size:17px;text-shadow:0 0 14px rgba(255,47,125,.4)}
.players{display:grid;grid-template-columns:1fr 26px 1fr;gap:6px;align-items:center}
.pc{min-height:44px;border:1px solid var(--line);border-radius:14px;display:flex;justify-content:center;align-items:center;gap:6px;background:rgba(255,255,255,.08);font-weight:900;font-size:14px;position:relative;padding:4px 7px}
.pc.a{border-color:var(--pink);background:rgba(255,47,125,.16);box-shadow:0 0 18px rgba(255,47,125,.33)}
.fx{position:absolute;bottom:2px;left:4px;display:flex;gap:3px;font-size:10px;opacity:.92}
.turn{text-align:center;padding:4px 10px;border:1px solid rgba(255,47,125,.5);border-radius:999px;background:rgba(255,47,125,.16);font-weight:900;font-size:13px;position:relative;overflow:hidden}
.turn.endgame{border-color:#ff4f68;background:rgba(255,79,104,.2);box-shadow:0 0 16px rgba(255,79,104,.25)}
.turn.endgame:after{content:"מצב סיום";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#ffd166}

.board-wrap{display:flex;justify-content:center;align-items:center;min-height:0;position:relative}
.board{width:min(97vw,560px);height:min(72dvh,760px);display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(8,1fr);gap:4px;padding:6px;border-radius:20px;border:1px solid rgba(255,47,125,.68);background:rgba(0,0,0,.3);box-shadow:0 0 28px rgba(255,47,125,.22),inset 0 0 20px rgba(255,255,255,.04);transition:box-shadow .35s,border-color .35s;position:relative;direction:ltr}
.board.endgame{border-color:#ff4f68;box-shadow:0 0 34px rgba(255,79,104,.35),inset 0 0 24px rgba(255,79,104,.1);animation:boardPulse 1.6s ease-in-out infinite}
@keyframes boardPulse{0%,100%{filter:saturate(1)}50%{filter:saturate(1.14)}}
.board.endgame .goal{animation:trophyPulse 1.1s ease-in-out infinite}
@keyframes trophyPulse{0%,100%{box-shadow:0 0 12px rgba(255,209,102,.45)}50%{box-shadow:0 0 24px rgba(255,209,102,.75)}}
.board.fog:before{content:"";position:absolute;inset:0;border-radius:20px;pointer-events:none;background:radial-gradient(circle at 50% 50%,rgba(255,90,120,.25),transparent 60%);animation:fog .75s ease}
@keyframes fog{from{opacity:0}20%{opacity:1}to{opacity:0}}

.cell{position:relative;border-radius:11px;border:1px solid rgba(255,255,255,.16);display:flex;justify-content:center;align-items:center;background:linear-gradient(145deg,#35194b,#241334);overflow:hidden;transition:transform .25s ease, box-shadow .25s ease}
.cell:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent)}
.cell.glow{box-shadow:0 0 20px rgba(255,255,255,.25);transform:scale(1.04)}
.cell.flip{animation:flip .34s ease}
@keyframes flip{0%{transform:scale(1) rotateY(0)}50%{transform:scale(.92) rotateY(90deg)}100%{transform:scale(1) rotateY(0)}}
.cell.start{border-color:#46a3ff}
.cell.goal{border-color:#ffd166;box-shadow:0 0 14px rgba(255,209,102,.45)}
.cell.seen.kiss{background:linear-gradient(145deg,#6d1f4b,#321527)}
.cell.seen.task{background:linear-gradient(145deg,#6d3a10,#2f1709)}
.cell.seen.question{background:linear-gradient(145deg,#492777,#1f1133)}
.cell.seen.temptation{background:linear-gradient(145deg,#035a5e,#032a2d)}
.cell.seen.duel{background:linear-gradient(145deg,#672a5d,#2f112b)}
.cell.seen.drink{background:linear-gradient(145deg,#5a1530,#250916)}
.cell.seen.empty{background:linear-gradient(145deg,#2f2b3d,#181420)}
.icon{font-size:23px;z-index:1}
.badge{position:absolute;z-index:2;font-size:8px;padding:2px 4px;border-radius:7px;font-weight:900}
.start .badge{left:3px;bottom:3px;background:#46a3ff}
.goal .badge{right:3px;top:3px;background:#ffd166;color:#111}
.preview{position:absolute;z-index:5;font-size:25px;animation:popIn .28s ease}
@keyframes popIn{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}

.layer{position:absolute;inset:6px;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(8,1fr);pointer-events:none;direction:ltr}
.tk{position:absolute;z-index:9;width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.38);transform:translate(-50%,-50%);transition:left .28s cubic-bezier(.22,.61,.36,1),top .28s cubic-bezier(.22,.61,.36,1),transform .16s ease,filter .18s}
.tk.land{transform:translate(-50%,-50%) scale(1.15)}
.tk.warp{filter:brightness(2) saturate(1.4);transform:translate(-50%,-50%) scale(.7)}

.moves{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mv{height:40px;border-radius:12px;border:1px solid rgba(255,47,125,.72);background:linear-gradient(145deg,rgba(255,47,125,.82),rgba(255,0,102,.56));color:#fff;font-size:22px;transition:transform .1s}
.mv:active{transform:scale(.96)}
.mv:disabled{opacity:.32}

.modal{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;padding:12px;background:rgba(0,0,0,.82);backdrop-filter:blur(8px)}
.modal.show{display:flex}
.mc{width:min(100%,420px);max-height:88dvh;overflow:auto;border:1px solid var(--line);border-radius:22px;padding:14px;text-align:center;background:linear-gradient(170deg,#251236,#11091b);box-shadow:0 24px 70px rgba(0,0,0,.7);animation:pop .2s ease}
@keyframes pop{from{transform:scale(.94);opacity:.45}to{transform:scale(1);opacity:1}}
.mi{font-size:52px;animation:shine 1.2s ease infinite alternate}
@keyframes shine{from{filter:drop-shadow(0 0 2px rgba(255,255,255,.2))}to{filter:drop-shadow(0 0 14px rgba(255,209,102,.45))}}
.mt{font-size:21px;font-weight:900;margin:5px 0}
.mx{white-space:pre-line;line-height:1.55;color:rgba(255,255,255,.92);font-size:14px}
.ma{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.mb{border:none;border-radius:999px;padding:11px;color:#fff;font-weight:900;background:linear-gradient(130deg,var(--pink2),var(--pink))}
.mb.alt{border:1px solid var(--line);background:rgba(255,255,255,.12)}
.mb.good{background:linear-gradient(130deg,#00c777,#00aa62)}
.mb.bad{background:linear-gradient(130deg,#ff5a6e,#ff3450)}
.timer-box{display:grid;gap:6px;margin:10px 0 2px}
.timer-btn{border:1px solid rgba(255,209,102,.45);border-radius:999px;padding:9px 12px;background:rgba(255,209,102,.12);color:#ffd166;font-weight:900}
.timer-display{font-size:28px;font-weight:900;color:#ffd166;text-shadow:0 0 14px rgba(255,209,102,.35)}

.emoji-task{margin-top:10px;padding:9px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.06)}
.emoji-picked{min-height:30px;margin-bottom:8px;font-size:24px;font-weight:900;color:#ffd166}
.emoji-mini{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.emoji-mini button{height:32px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.08);color:#fff;font-size:18px}
.emoji-mini button.sel{border-color:var(--gold);background:rgba(255,209,102,.22)}
.impact{animation:impact .22s ease}
@keyframes impact{0%{transform:scale(1)}50%{transform:scale(1.09)}100%{transform:scale(1)}}

.shake{animation:sh .45s}
@keyframes sh{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.cf{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:24}
.c{position:absolute;top:-22px;width:10px;height:14px;animation:fall 2.2s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.1}}

.toast-wrap{position:fixed;z-index:30;left:50%;bottom:calc(12px + env(safe-area-inset-bottom));transform:translateX(-50%);display:grid;gap:6px;pointer-events:none}
.toast{max-width:88vw;padding:8px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.22);background:rgba(15,9,25,.9);font-size:12px;font-weight:800;text-align:center;animation:toast .2s ease}
@keyframes toast{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.warn{border-color:rgba(255,209,102,.55)}.toast.danger{border-color:rgba(255,79,104,.65)}
.trophy-big{font-size:78px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.08)}}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.stat{padding:8px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.08);font-size:12px}

@media(max-width:390px){.board{height:min(70dvh,650px)}.pc{min-height:40px;font-size:12px}.mv{height:36px}.mt{font-size:19px}}
@media(max-height:730px){.title{display:none}.board{height:min(68dvh,620px)}.mv{height:36px}}
</style>
</head>
<body>
<div class="bg"></div>
<section id="start" class="screen show">
  <div class="card">
    <h1>בום של אהבה</h1>
    <p class="lead">תחרות זוגית מצחיקה, אינטימית ובלתי צפויה</p>
    <div id="lastWinner" class="last-win"></div>
    <div class="g2"><div><label>שם שחקן/ית 1</label><input id="n1" placeholder="נועה"></div><div><label>שם שחקן/ית 2</label><input id="n2" placeholder="דניאל"></div></div>
    <div class="g2"><div><label>מין</label><select id="g1"><option value="f">נקבה</option><option value="m">זכר</option></select></div><div><label>מין</label><select id="g2"><option value="m">זכר</option><option value="f">נקבה</option></select></div></div>
    <div class="g2"><div><label>אימוג׳י שחקן/ית 1</label><div id="e1" class="eg"></div></div><div><label>אימוג׳י שחקן/ית 2</label><div id="e2" class="eg"></div></div></div>
    <label class="drink"><span>מצב שתייה 🍷</span><input id="drinkMode" type="checkbox"></label>
    <button class="main" id="startBtn">יאללה מתחילים</button>
  </div>
</section>
<section id="game" class="screen">
  <div class="wrap">
    <div class="top">
      <div class="head"><button id="settingsBtn" class="set">⚙️</button><div class="title">בום של אהבה</div><div></div></div>
      <div class="players"><div id="pc0" class="pc"><span id="pe0"></span><span id="pn0"></span><div id="fx0" class="fx"></div></div><div>VS</div><div id="pc1" class="pc"><span id="pe1"></span><span id="pn1"></span><div id="fx1" class="fx"></div></div></div>
      <div id="turn" class="turn"></div>
    </div>
    <div class="board-wrap"><div id="board" class="board"></div><div id="layer" class="layer"></div><div id="t0" class="tk"></div><div id="t1" class="tk"></div></div>
    <div class="moves"><button id="u" class="mv">↑</button><button id="d" class="mv">↓</button><button id="l" class="mv">←</button><button id="r" class="mv">→</button></div>
  </div>
</section>
<div id="modal" class="modal"><div class="mc"><div id="mi" class="mi"></div><div id="mt" class="mt"></div><div id="mx" class="mx"></div><div id="ma" class="ma"></div></div></div>
<div id="confetti" class="cf"></div><div id="toasts" class="toast-wrap"></div>
<script>
const ROWS=8,COLS=6,START=[7,5],GOAL=[0,0],IC={kiss:"💋",task:"🎯",question:"❔",temptation:"❓",duel:"⚔️",drink:"🍷",empty:"",bomb:"💣",goal:"🏆"},EM=["😈","😎","🥵","😘","😜","🫦","😏","😍","🤠","🦊","🔥","⚡","🩷","💫","🍓","🍒"];
const $=id=>document.getElementById(id),board=$("board"),layer=$("layer"),modal=$("modal");
const S={e1:"😈",e2:"😎",board:[],players:[],cur:0,turn:1,busy:false,over:false,pending:null,advance:false,manualMove:null,actor:null,history:{kiss:[],task:[],question:[],duel:[],tempt:[],drink:[]},endgameShown:false,modalVersion:0,timer:null,drink:false,stats:{bombs:0,duels:0,risks:0}};
const W={
  m:{give:"תן",do:"עשה",say:"אמור",ask:"שאל",whisper:"לחש",choose:"בחר",look:"הסתכל",describe:"תאר",tell:"ספר",try:"נסה",hold:"החזק",invent:"המצא",make:"גרום",take:"קח",return:"חזור",drink:"שתה",stand:"עמוד",show:"הראה",perform:"בצע",start:"תלחץ",answer:"ענה",count:"מנה",touch:"גע",keep:"שמור",win:"ניצח",fail:"נכשל",ready:"מוכן"},
  f:{give:"תני",do:"עשי",say:"אמרי",ask:"שאלי",whisper:"לחשי",choose:"בחרי",look:"הסתכלי",describe:"תארי",tell:"ספרי",try:"נסי",hold:"החזיקי",invent:"המציאי",make:"גרמי",take:"קחי",return:"חזרי",drink:"שתי",stand:"עמדי",show:"הראי",perform:"בצעי",start:"תלחצי",answer:"עני",count:"מני",touch:"געי",keep:"שמרי",win:"ניצחה",fail:"נכשלה",ready:"מוכנה"}
};
const WIN_KEY="boomLifetimeWins";
const Audio={ctx:null,muted:false,ensure(){if(this.muted)return null;if(!this.ctx){const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;this.ctx=new C}return this.ctx},setMuted(v){this.muted=v;if(v&&this.ctx&&this.ctx.state==="running")this.ctx.suspend();if(!v&&this.ctx&&this.ctx.state==="suspended")this.ctx.resume()},play(t){const a=this.ensure();if(!a)return;const m={tap:[370,.03],good:[620,.06],bad:[220,.09],bomb:[130,.14],win:[760,.2]}[t]||[420,.05];const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type="sine";o.frequency.value=m[0];g.gain.value=.03;o.start();o.stop(a.currentTime+m[1])}};
const DB = {
  kiss:[
    "{actor}, {give} ל{target} נשיקה איטית של 10 שניות",
    "{actor}, {whisper} ל{target} משפט אחד שמדליק אותך",
    "{actor}, {choose} מקום אחד שבו {target} ינשק אותך",
    "{actor}, {look} ל{target} בעיניים במשך 15 שניות בלי לצחוק",
    "{actor}, {give} ל{target} נשיקה קצרה ואז מחמאה חצופה",
    "{actor}, {whisper} ל{target} סוד קטן שלא אמרת היום",
    "{actor}, {do} מבט מפתה ל{target} במשך 10 שניות",
    "{actor}, {give} ל{target} חיבוק צמוד של 20 שניות",
    "{actor}, {tell} ל{target} איפה הכי בא לך לקבל נשיקה",
    "{actor}, {give} ל{target} שלוש נשיקות קצרות לבחירתך",
    "{actor}, {say} ל{target} מה הכי מושך אותך עכשיו",
    "{actor}, {whisper} ל{target} משפט שאסור לומר בקול רם",
    "{actor}, {choose} נשיקה אחת: מצח, צוואר או שפתיים",
    "{actor}, {give} ל{target} נשיקה איטית במיוחד",
    "{actor}, {tell} ל{target} איזה מגע שלו הכי מסוכן לך",
    "{actor}, {do} צעידה איטית לכיוון {target} וסיים במבט",
    "{actor}, {say} ל{target} מחמאה אחת שתגרום לו לזוז בכיסא",
    "{actor}, {give} ל{target} נשיקה של 12 שניות בדיוק"
  ],
  task:[
    "{actor}, {do} ריקוד ניצחון מוגזם במשך 10 שניות",
    "{actor}, {stand} על רגל אחת במשך 20 שניות",
    "{actor}, {say} משפט פתיחה גרוע במיוחד ל{target}",
    "{actor}, {do} פרצוף מפתה במשך 10 שניות בלי לצחוק",
    "{actor}, {invent} לעצמך שם במה סקסי",
    "{actor}, {tell} פדיחה קצרה בדייט או בפלרטוט",
    "{actor}, {show} הליכת דוגמן מוגזמת מקצה החדר וחזרה",
    "{actor}, {say} מחמאה ל{target} בקול של קריין דרמטי",
    "{actor}, {do} חיקוי של אדם שמנסה להתחיל איתך",
    "{actor}, {invent} סלוגן פרסומת לגוף שלך",
    "{actor}, {try} להצחיק את {target} במשפט אחד בלבד",
    "{actor}, {say} שלוש מילים שמתארות את הערב הזה",
    "{actor}, {do} מבט של נבל רומנטי במשך 8 שניות",
    "{actor}, {tell} ל{target} מה הפרס שלך אם תנצח במשחק",
    "{actor}, {perform} נאום זכייה של 15 שניות",
    "{actor}, {invent} כינוי חדש וחצוף ל{target}",
    "{actor}, {do} פוזת שער מגזין ל-10 שניות",
    "{actor}, {say} ל{target} משפט אחד שיישאר לו בראש",
    "{actor}, {try} לפתות את {target} בלי לזוז מהמקום",

async function animateToken(i,r,c){const o=slotPos(r,c),t=$("t"+i);t.style.left=o.x+"px";t.style.top=o.y+"px";await wait(280);pulseToken(i)}
function checkVictory(i){const p=S.players[i];if(p.pos[0]===GOAL[0]&&p.pos[1]===GOAL[1]){S.over=true;winScreen(p);return true}return false}
async function moveToCoord(i,r,c){const t=$("t"+i);t.classList.add("warp");await wait(90);S.players[i].pos=[r,c];await animateToken(i,r,c);await wait(60);t.classList.remove("warp");stackTokens();checkVictory(i)}
function startManualMove(player,steps,kind,msg){S.manualMove={player,remaining:steps,kind,label:kind==="back"?`${stepText(steps)} אחורה`:manualStepText(steps)};S.actor=null;closeModal();S.busy=false;toast(msg,1800,"warn");if(!hasManualMoves()){toast("אין צעדים זמינים — ממשיכים",1000);S.manualMove=null;nextTurn();return}ui()}
async function bombHit(i=actorIndex()){S.manualMove=null;S.stats.bombs++;if(navigator.vibrate)navigator.vibrate([80,70,120]);Audio.play("bomb");board.classList.add("shake");setTimeout(()=>board.classList.remove("shake"),450);await moveToCoord(i,START[0],START[1]);
toast("💥 בום! חזרה להתחלה",1300,"danger");
card("💥","בום!",pickText("bomb",i));
}

async function tileRevealFlow(cell,actor=S.cur){
  S.actor=actor;
  cell.el.classList.add("glow");
  await wait(180);
  cell.el.classList.remove("glow");

  cell.el.classList.add("flip");
  setTimeout(()=>cell.el.classList.remove("flip"),340);

  const pv=document.createElement("span");
  pv.className="icon preview";
  pv.textContent=cell.type==="bomb" ? "💣" : IC[cell.type];
  cell.el.appendChild(pv);

  if(cell.type==="bomb"){
    await wait(760);
    pv.remove();
    await bombHit(actor);
    if(!modal.classList.contains("show"))S.actor=null;
    return;
  }

  await wait(680);
  pv.remove();
  await resolveCell(cell);
  if(!modal.classList.contains("show"))S.actor=null;
}
async function resolveCell(cell){
  if(cell.type==="bomb"){await bombHit(actorIndex());return}
  cell.reveal=true;paint(cell);
  if(cell.type==="kiss"){card("💋","אינטימיות",fmt(pickNoRepeat("kiss")));return}
  if(cell.type==="task"){card("🎯","אתגר",fmt(pickNoRepeat("task")));return}
  if(cell.type==="question"){card("❔","שאלה",fmt(pickNoRepeat("question")));return}
  if(cell.type==="drink"){card("🍷","שתייה",fmt(pickNoRepeat("drink")));return}
  if(cell.type==="duel"){startDuel();return}
  if(cell.type==="temptation"){startTemptation();return}
  if(cell.type==="empty"){pop("","קובייה ריקה","לא קרה כלום... ממשיכים",[{t:"ממשיכים",k:"done"}],true);return}
}
function card(i,t,x){const player=actorIndex(),sec=timerSeconds(x);if(sec){S.pending={k:"timed_intro",i,t,x,player,sec};S.actor=player;pop("⏳","אתגר זמן",timedIntroText(player),[{t:"התחל",k:"timedStart"}],false);return}pop(i,t,x,[{t:"בוצע",k:"done"}],true)}
function showTimedChallenge(x){S.pending={k:"timed_active",i:x.i,t:x.t,x:x.x,player:x.player,sec:x.sec};S.actor=x.player;pop(x.i,x.t,x.x,[{t:"בוצע",k:"timedDone",kindClass:"good"},{t:"לא הצלחתי",k:"timedFail",kindClass:"bad"}],true,{timerSec:x.sec,autoTimer:true})}
function distToGoal(pos){return Math.abs(pos[0]-GOAL[0])+Math.abs(pos[1]-GOAL[1])}
function findBackStep(i){const p=S.players[i].pos,now=distToGoal(p),dirs=[[1,0],[0,1],[-1,0],[0,-1]];for(const [dr,dc] of dirs){const nr=p[0]+dr,nc=p[1]+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&distToGoal([nr,nc])>now)return[nr,nc]}return null}
async function penaltyBackOne(player,msg){S.manualMove=null;S.busy=true;closeModal();updateMoveButtons();const step=findBackStep(player),w=W[S.players[player].gender]||W.f;if(step){S.players[player].pos=[step[0],step[1]];await animateToken(player,step[0],step[1]);stackTokens();toast(msg||`${S.players[player].name} ${w.return} צעד אחד בלי להפעיל קובייה`,1400,"danger")}else toast("אין קובייה אחורה — ממשיכים",1200,"warn");S.busy=false;if(!S.over)nextTurn();else updateMoveButtons()}
function startTemptation(){S.stats.risks++;const t=pickNoRepeat("tempt"),player=actorIndex();S.pending={k:"tempt",d:t,player};const timed=timerSeconds(t.c)>0;pop("❓","הימור",`${S.players[player].name}, רוצה לקחת סיכון?\n\nהצלחה: ${fmt(t.win,player)}\nכישלון: ${fmt(t.lose,player)}${timed?"\n\nהמשימה עצמה תופיע רק אחרי לחיצה על התחלה.":`\n\n${fmt(t.c,player)}`}`,[{t:"לקחת סיכון",k:"risk",kindClass:"bad"},{t:"לא לקחת סיכון",k:"safe",kindClass:"alt"}],true)}
function startDuel(){S.stats.duels++;const d=pickNoRepeat("duel"),player=actorIndex();S.pending={k:"duel_intro",d,player};pop("⚔️","דו־קרב",'לפניכם דו־קרב זוגי. ברגע שתלחצו על "התחל דו־קרב", תופיע משימה מוגבלת בזמן. הראשון שמצליח לבצע אותה מנצח וזוכה בצעד נוסף.',[{t:"התחל דו־קרב",k:"duelStart"}],false)}
function showDuelChallenge(x){S.pending={k:"duel_result",d:x.d,player:x.player};const sec=timerSeconds(x.d)||30;pop("⚔️","דו־קרב",`${fmt(x.d,x.player)}\n\nהראשון שמצליח לבצע את המשימה מנצח`,[{t:wonText(0),k:"duelWin0",kindClass:"good"},{t:wonText(1),k:"duelWin1",kindClass:"good"}],false,{timerSec:sec,autoTimer:true})}
function openSuccessFail(){clearTimer();const player=S.pending?.player??actorIndex();$("mt").textContent="תוצאת ההימור";$("mx").textContent=`${S.players[player].name}, מה הייתה התוצאה?`;const ma=$("ma");ma.innerHTML="";ma.style.gridTemplateColumns="1fr 1fr";const s=document.createElement("button"),f=document.createElement("button");s.className="mb good";f.className="mb bad";s.textContent="הצלחתי";f.textContent="לא הצלחתי";s.onclick=()=>act("succ",S.modalVersion);f.onclick=()=>act("fail",S.modalVersion);ma.appendChild(s);ma.appendChild(f)}
function applyTemptOutcome(x,success){const player=x.player,txt=success?fmt(x.d.win,player):fmt(x.d.lose,player),steps=success?(txt.includes("+3")?3:2):(txt.includes("צעד אחד")?1:2),kind=success?"forward":"back",w=W[S.players[player].gender]||W.f;startManualMove(player,steps,kind,`${success?"ההימור הצליח":"ההימור נכשל"}: ${txt}. ${w.choose} ${manualStepText(steps)}.`)}
function microTitle(){const a=S.stats.bombs<3?"שורדי הפצצות":"מכורי הסיכון",b=S.stats.duels>6?"אלופי הדו-קרב":"כוכבי הפלרטוט";return`${a} • ${b}`}
function confetti(){const f=$("confetti");f.innerHTML="";for(let i=0;i<110;i++){const d=document.createElement("div");d.className="c";d.style.left=Math.random()*100+"vw";d.style.background=["#ff2f7d","#ffd166","#46a3ff","#8cff8c","#fff"][Math.floor(Math.random()*5)];d.style.animationDelay=(Math.random()*.5)+"s";f.appendChild(d)}setTimeout(()=>f.innerHTML="",2500)}
function winScreen(w){
  const idx=Math.max(0,S.players.indexOf(w));
  const rec=recordWin(w.name);
  w.wins=rec.total;
  try{localStorage.setItem("boomLastWinner",w.name)}catch(_e){}
  const funny = pickText("victory",idx);
  const stats = `<div class="stats"><div class="stat">תורים: ${S.turn}</div><div class="stat">פצצות: ${S.stats.bombs}</div><div class="stat">דו־קרבות: ${S.stats.duels}</div><div class="stat">הימורים: ${S.stats.risks}</div></div>`;

  pop(
    "",
    `ניצחון גדול!`,
    `<div class="trophy-big">🏆</div>${wonText(idx)}<br>ניצחונות קודמים: ${rec.prev}<br>תואר זוגי: ${microTitle()}<br>${funny}${stats}`,
    [{t:"שחקו שוב",k:"restart"}],
    false
  );

  Audio.play("win");
  confetti();
}
async function resolvePending(k){
  const x=S.pending;
  if(!x)return false;
  if(x.k==="timed_intro"&&k==="timedStart"){showTimedChallenge(x);return true}
  if(x.k==="timed_active"){
    if(k==="timedDone"){S.pending=null;Audio.play("good");return false}
    if(k==="timedFail"){S.pending=null;Audio.play("bad");await penaltyBackOne(x.player);return true}
  }
  if(x.k==="tempt"){
    if(k==="safe"){S.pending=null;toast("🙂 לא לקחת סיכון — ממשיכים",1000);Audio.play("tap");return false}
    if(k==="risk"){
      const sec=timerSeconds(x.d.c);
      if(sec){S.pending={k:"tempt_timed_intro",d:x.d,player:x.player,sec};S.actor=x.player;pop("⏳","אתגר זמן",timedIntroText(x.player),[{t:"התחל",k:"timedStart"}],false);return true}
      S.pending={k:"tempt2",d:x.d,player:x.player};openSuccessFail();return true
    }
  }
  if(x.k==="tempt_timed_intro"&&k==="timedStart"){
    S.pending={k:"tempt_timed_active",d:x.d,player:x.player,sec:x.sec};
    S.actor=x.player;
    pop("❓","הימור בזמן",`${fmt(x.d.c,x.player)}\n\nהצלחה: ${fmt(x.d.win,x.player)}\nלא הצלחת? ${fmt(x.d.lose,x.player)}`,[{t:"הצלחתי",k:"succ",kindClass:"good"},{t:"לא הצלחתי",k:"timedFail",kindClass:"bad"}],false,{timerSec:x.sec,autoTimer:true});
    return true
  }
  if(x.k==="tempt_timed_active"){
    if(k==="succ"){S.pending=null;Audio.play("good");applyTemptOutcome(x,true);return true}
    if(k==="timedFail"||k==="fail"){const w=W[S.players[x.player].gender]||W.f;S.pending=null;Audio.play("bad");await penaltyBackOne(x.player,`${S.players[x.player].name} ${w.fail} באתגר: ${w.return} צעד אחד בלי להפעיל קובייה`);return true}
  }
  if(x.k==="tempt2"){
    const succ=k==="succ";
    Audio.play(succ?"good":"bad");
    S.pending=null;
    applyTemptOutcome(x,succ);
    return true
  }
  if(x.k==="duel_intro"&&k==="duelStart"){showDuelChallenge(x);return true}
  if(x.k==="duel_result"&&k.startsWith("duelWin")){
    const w=+k.slice(-1),words=W[S.players[w].gender]||W.f;
    S.pending=null;
    Audio.play("good");
    startManualMove(w,1,"forward",`${S.players[w].name} ${words.win} בדו־קרב ⚔️ — ${words.choose} צעד פרס אחד ידנית. פצצה בדרך מופעלת כרגיל.`);
    return true
  }
  return false
}
async function applyModalAction(k,v){
  if(v!==S.modalVersion)return;
  if(k==="restart"){location.reload();return}
  if(k==="mute"){Audio.setMuted(!Audio.muted);toast(Audio.muted?"🔇 סאונד הושתק":"🔈 סאונד הופעל",900);closeModal();S.busy=false;updateMoveButtons();return}
  if(k==="help"){
    pop("ℹ️","עזרה","מטרה: להגיע ראשונים לגביע.\n💋 אינטימיות\n🎯 משימה\n❔ שאלה\n❓ הימור\n⚔️ דו־קרב: קודם מתחילים, אחר כך מופיעה משימה על זמן. המנצח מקבל צעד פרס אחד בלבד.\n💣 פצצה מחזירה להתחלה ונשארת פעילה\nקובייה ריקה = לא קורה כלום\n\nבמשימה עם זמן הטיימר מתחיל רק אחרי מסך ההסבר. לחיצה על \"לא הצלחתי\" מחזירה צעד אחד בלי להפעיל את הקובייה שנוחתים עליה.",[{t:"חזרה",k:"resume"}],false);
    return
  }
  if(k==="newGame"){location.reload();return}
  if(k==="resume"){closeModal();S.busy=false;updateMoveButtons();return}
  let opened=false;
  if(S.pending)opened=await resolvePending(k);
  if(opened)return;
  if(S.over)return;
  closeModal();
  if(S.advance)nextTurn();
  updateMoveButtons()
}
async function moveTurn(dr,dc){if(S.busy||S.over||modal.classList.contains("show"))return;const manual=S.manualMove,me=manual?manual.player:S.cur,p=S.players[me],nr=p.pos[0]+dr,nc=p.pos[1]+dc;if(!canMove(me,dr,dc))return;S.busy=true;updateMoveButtons();p.pos=[nr,nc];await animateToken(me,nr,nc);stackTokens();if(checkVictory(me)){S.manualMove=null;S.busy=false;updateMoveButtons();return}const cell=S.board[nr][nc];if(manual){manual.remaining--;if(cell.type==="bomb"){S.manualMove=null;await tileRevealFlow(cell,me);S.busy=false;ui();return}if(manual.remaining>0){S.busy=false;if(!hasManualMoves()){toast("אין עוד צעדים זמינים — התנועה הסתיימה",1100);S.manualMove=null;nextTurn()}else ui();return}S.manualMove=null;await tileRevealFlow(cell,me);S.busy=false;ui();return}await tileRevealFlow(cell,me);S.busy=false;ui()}
function nextTurn(){S.cur=1-S.cur;S.turn++;ui()}
function startGame(){if($("game").classList.contains("show"))return;const n1=$("n1").value.trim()||"שחקן א",n2=$("n2").value.trim()||"שחקן ב";S.players=[{name:n1,gender:$("g1").value,emoji:S.e1,pos:[...START],wins:getWins(n1)},{name:n2,gender:$("g2").value,emoji:S.e2,pos:[...START],wins:getWins(n2)}];S.cur=0;S.turn=1;S.busy=false;S.over=false;S.pending=null;S.advance=false;S.manualMove=null;S.actor=null;S.history={kiss:[],task:[],question:[],duel:[],tempt:[],drink:[]};S.stats={bombs:0,duels:0,risks:0};S.endgameShown=false;S.modalVersion=0;S.drink=$("drinkMode").checked;buildBoard();$("start").classList.remove("show");$("game").classList.add("show");ui();placeTokens();const drinkLine=S.drink?'\n🍷 שתייה — משימת שתייה קלילה במהלך המשחק':"";pop("💘","מתחילים",`💋 אינטימיות\n🎯 משימה\n❔ שאלה\n❓ הימור\n⚔️ דו־קרב\n💣 פצצה${drinkLine}\nקובייה ריקה = אין פעולה\n\nמשימות עם זמן ייפתחו במסך הסבר ורק אז הטיימר יתחיל. כל משימה היא הזמנה בלבד; אם לא מתאים לבצע משהו, לחצו על כפתור התוצאה המתאים והמשיכו.`,[{t:"הבנתי",k:"resume"}],false)}
function openSettings(){if(S.busy){toast("רגע, פעולה עדיין מתבצעת",900,"warn");return}pop("⚙️","הגדרות","",[{t:Audio.muted?"הפעלת סאונד":"השתקת סאונד",k:"mute"},{t:"עזרה",k:"help"},{t:"משחק חדש",k:"newGame"},{t:"חזרה למשחק",k:"resume"}],false)}
$("startBtn").onclick=startGame;$("settingsBtn").onclick=openSettings;$("u").onclick=()=>moveTurn(-1,0);$("d").onclick=()=>moveTurn(1,0);$("l").onclick=()=>moveTurn(0,-1);$("r").onclick=()=>moveTurn(0,1);
window.addEventListener("pointerdown",()=>Audio.ensure(),{once:true});
async function act(k,v){if(v!==S.modalVersion)return;[...$("ma").querySelectorAll("button")].forEach(b=>b.disabled=true);try{await applyModalAction(k,v)}catch(e){console.error(e);toast("אירעה שגיאה בפעולה. נסו שוב.",1200,"danger");[...$("ma").querySelectorAll("button")].forEach(b=>b.disabled=false)}}
</script>
