<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>בום של אהבה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#09040f;--bg2:#190c29;--txt:#fff;--muted:rgba(255,255,255,.72);--pink:#ff2f7d;--pink2:#ff0066;--gold:#ffd166;--line:rgba(255,255,255,.2);--danger:#ff4f68}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:Heebo,sans-serif}
button,input,select{font-family:inherit}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 18% 12%,rgba(255,47,125,.3),transparent 35%),radial-gradient(circle at 88% 82%,rgba(95,73,255,.24),transparent 42%),linear-gradient(160deg,var(--bg),var(--bg2) 66%,#07020a)}
.screen{position:fixed;inset:0;display:none;z-index:2}.show{display:flex}
#start{align-items:center;justify-content:center;padding:10px;overflow:auto}
.card{width:min(100%,560px);border:1px solid var(--line);border-radius:24px;padding:14px;background:linear-gradient(165deg,rgba(255,255,255,.14),rgba(255,255,255,.05));backdrop-filter:blur(18px);box-shadow:0 22px 70px rgba(0,0,0,.55)}
h1{margin:0 0 6px;text-align:center;font-size:clamp(34px,9vw,52px);font-weight:900;line-height:1.05;background:linear-gradient(120deg,#fff,var(--pink),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lead{margin:0 0 10px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.45}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
label{display:block;color:var(--muted);font-size:11px;font-weight:700;margin:6px 0 3px}
input,select{width:100%;padding:9px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#fff}
.eg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.emoji{height:34px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.08);color:#fff;font-size:19px}
.emoji.sel{border-color:transparent;background:linear-gradient(130deg,var(--pink2),var(--pink))}
.main{width:100%;margin-top:11px;border:none;border-radius:999px;padding:12px;color:#fff;font-weight:900;font-size:15px;background:linear-gradient(130deg,var(--pink2),var(--pink));box-shadow:0 12px 30px rgba(255,47,125,.35)}

#game{padding:6px}
.wrap{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:6px}
.top{display:grid;gap:5px}
.head{display:grid;grid-template-columns:36px 1fr 36px;align-items:center}
.set{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,47,125,.6);background:rgba(255,255,255,.1);color:#fff;font-size:17px}
.title{text-align:center;font-weight:900;font-size:17px;text-shadow:0 0 14px rgba(255,47,125,.4)}
.players{display:grid;grid-template-columns:1fr 26px 1fr;gap:6px;align-items:center}
.pc{min-height:44px;border:1px solid var(--line);border-radius:14px;display:flex;justify-content:center;align-items:center;gap:6px;background:rgba(255,255,255,.08);font-weight:900;font-size:14px;position:relative;padding:4px 7px}
.pc.a{border-color:var(--pink);background:rgba(255,47,125,.16);box-shadow:0 0 18px rgba(255,47,125,.33)}
.fx{position:absolute;bottom:2px;left:4px;display:flex;gap:3px;font-size:10px;opacity:.92}
.turn{text-align:center;padding:4px 10px;border:1px solid rgba(255,47,125,.5);border-radius:999px;background:rgba(255,47,125,.16);font-weight:900;font-size:13px;position:relative;overflow:hidden}
.turn.endgame{border-color:#ff4f68;background:rgba(255,79,104,.2);box-shadow:0 0 16px rgba(255,79,104,.25)}
.turn.endgame:after{content:"מצב סיום";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#ffd166}

.board-wrap{display:flex;justify-content:center;align-items:center;min-height:0;position:relative}
.board{width:min(97vw,560px);height:min(72dvh,760px);display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(8,1fr);gap:4px;padding:6px;border-radius:20px;border:1px solid rgba(255,47,125,.68);background:rgba(0,0,0,.3);box-shadow:0 0 28px rgba(255,47,125,.22),inset 0 0 20px rgba(255,255,255,.04);transition:box-shadow .35s,border-color .35s;position:relative}
.board.endgame{border-color:#ff4f68;box-shadow:0 0 34px rgba(255,79,104,.35),inset 0 0 24px rgba(255,79,104,.1);animation:boardPulse 1.6s ease-in-out infinite}
@keyframes boardPulse{0%,100%{filter:saturate(1)}50%{filter:saturate(1.14)}}
.board.endgame .goal{animation:trophyPulse 1.1s ease-in-out infinite}
@keyframes trophyPulse{0%,100%{box-shadow:0 0 12px rgba(255,209,102,.45)}50%{box-shadow:0 0 24px rgba(255,209,102,.75)}}
.board.fog:before{content:"";position:absolute;inset:0;border-radius:20px;pointer-events:none;background:radial-gradient(circle at 50% 50%,rgba(255,90,120,.25),transparent 60%);animation:fog .75s ease}
@keyframes fog{from{opacity:0}20%{opacity:1}to{opacity:0}}

.cell{position:relative;border-radius:11px;border:1px solid rgba(255,255,255,.16);display:flex;justify-content:center;align-items:center;background:linear-gradient(145deg,#35194b,#241334);overflow:hidden;transition:transform .25s ease, box-shadow .25s ease}
.cell:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent)}
.cell.glow{box-shadow:0 0 20px rgba(255,255,255,.25);transform:scale(1.04)}
.cell.flip{animation:flip .34s ease}
@keyframes flip{0%{transform:scale(1) rotateY(0)}50%{transform:scale(.92) rotateY(90deg)}100%{transform:scale(1) rotateY(0)}}
.cell.start{border-color:#46a3ff}
.cell.goal{border-color:#ffd166;box-shadow:0 0 14px rgba(255,209,102,.45)}
.cell.seen.kiss{background:linear-gradient(145deg,#6d1f4b,#321527)}
.cell.seen.task{background:linear-gradient(145deg,#6d3a10,#2f1709)}
.cell.seen.question{background:linear-gradient(145deg,#492777,#1f1133)}
.cell.seen.temptation{background:linear-gradient(145deg,#035a5e,#032a2d)}
.cell.seen.duel{background:linear-gradient(145deg,#672a5d,#2f112b)}
.cell.seen.bonus{background:linear-gradient(145deg,#725800,#352900)}
.icon{font-size:23px;z-index:1}
.badge{position:absolute;z-index:2;font-size:8px;padding:2px 4px;border-radius:7px;font-weight:900}
.start .badge{left:3px;bottom:3px;background:#46a3ff}
.goal .badge{right:3px;top:3px;background:#ffd166;color:#111}
.preview{position:absolute;z-index:5;font-size:25px;animation:popIn .28s ease}
@keyframes popIn{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}

.layer{position:absolute;inset:6px;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(8,1fr);pointer-events:none}
.tk{position:absolute;z-index:9;width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.38);transform:translate(-50%,-50%);transition:left .28s cubic-bezier(.22,.61,.36,1),top .28s cubic-bezier(.22,.61,.36,1),transform .16s ease,filter .18s}
.tk.land{transform:translate(-50%,-50%) scale(1.15)}
.tk.warp{filter:brightness(2) saturate(1.4);transform:translate(-50%,-50%) scale(.7)}

.moves{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mv{height:40px;border-radius:12px;border:1px solid rgba(255,47,125,.72);background:linear-gradient(145deg,rgba(255,47,125,.82),rgba(255,0,102,.56));color:#fff;font-size:22px;transition:transform .1s}
.mv:active{transform:scale(.96)}
.mv:disabled{opacity:.32}
.moves.reversed .mv{box-shadow:0 0 10px rgba(255,79,104,.35)}

.modal{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;padding:12px;background:rgba(0,0,0,.82);backdrop-filter:blur(8px)}
.modal.show{display:flex}
.mc{width:min(100%,420px);max-height:88dvh;overflow:auto;border:1px solid var(--line);border-radius:22px;padding:14px;text-align:center;background:linear-gradient(170deg,#251236,#11091b);box-shadow:0 24px 70px rgba(0,0,0,.7);animation:pop .2s ease}
@keyframes pop{from{transform:scale(.94);opacity:.45}to{transform:scale(1);opacity:1}}
.mi{font-size:52px;animation:shine 1.2s ease infinite alternate}
@keyframes shine{from{filter:drop-shadow(0 0 2px rgba(255,255,255,.2))}to{filter:drop-shadow(0 0 14px rgba(255,209,102,.45))}}
.mt{font-size:21px;font-weight:900;margin:5px 0}
.mx{white-space:pre-line;line-height:1.55;color:rgba(255,255,255,.92);font-size:14px}
.ma{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.mb{border:none;border-radius:999px;padding:11px;color:#fff;font-weight:900;background:linear-gradient(130deg,var(--pink2),var(--pink))}
.mb.alt{border:1px solid var(--line);background:rgba(255,255,255,.12)}
.mb.good{background:linear-gradient(130deg,#00c777,#00aa62)}
.mb.bad{background:linear-gradient(130deg,#ff5a6e,#ff3450)}

.duel-count{font-size:40px;font-weight:900;color:#ffd166;text-shadow:0 0 16px rgba(255,209,102,.55)}
.duel-row{display:grid;gap:8px;margin-top:10px}
.duel-line{display:grid;grid-template-columns:82px 1fr 34px;gap:6px;align-items:center}
.duel-name{font-size:12px;font-weight:800;color:#ffd9e9}
.duel-bar{height:12px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden;border:1px solid rgba(255,255,255,.2)}
.duel-fill{height:100%;width:0%;background:linear-gradient(90deg,#00d07f,#52ffbe);transition:width .08s}
.duel-score{font-size:12px;font-weight:900}
.impact{animation:impact .22s ease}
@keyframes impact{0%{transform:scale(1)}50%{transform:scale(1.09)}100%{transform:scale(1)}}

.shake{animation:sh .45s}
@keyframes sh{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.cf{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:24}
.c{position:absolute;top:-22px;width:10px;height:14px;animation:fall 2.2s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.1}}

.toast-wrap{position:fixed;z-index:30;left:50%;bottom:calc(12px + env(safe-area-inset-bottom));transform:translateX(-50%);display:grid;gap:6px;pointer-events:none}
.toast{max-width:88vw;padding:8px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.22);background:rgba(15,9,25,.9);font-size:12px;font-weight:800;text-align:center;animation:toast .2s ease}
@keyframes toast{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.warn{border-color:rgba(255,209,102,.55)}.toast.danger{border-color:rgba(255,79,104,.65)}
.trophy-big{font-size:78px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-8px) scale(1.08)}}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.stat{padding:8px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.08);font-size:12px}

@media(max-width:390px){.board{height:min(70dvh,650px)}.pc{min-height:40px;font-size:12px}.mv{height:36px}.mt{font-size:19px}}
@media(max-height:730px){.title{display:none}.board{height:min(68dvh,620px)}.mv{height:36px}}
</style>
</head>
<body>
<div class="bg"></div>
<section id="start" class="screen show">
  <div class="card">
    <h1>בום של אהבה</h1>
    <p class="lead">תחרות זוגית מצחיקה, אינטימית ובלתי צפויה</p>
    <div class="g2"><div><label>שם שחקן/ית 1</label><input id="n1" placeholder="נועה"></div><div><label>שם שחקן/ית 2</label><input id="n2" placeholder="דניאל"></div></div>
    <div class="g2"><div><label>מין</label><select id="g1"><option value="f">נקבה</option><option value="m">זכר</option></select></div><div><label>מין</label><select id="g2"><option value="m">זכר</option><option value="f">נקבה</option></select></div></div>
    <div class="g2"><div><label>אימוג׳י שחקן/ית 1</label><div id="e1" class="eg"></div></div><div><label>אימוג׳י שחקן/ית 2</label><div id="e2" class="eg"></div></div></div>
    <button class="main" id="startBtn">יאללה מתחילים</button>
  </div>
</section>
<section id="game" class="screen">
  <div class="wrap">
    <div class="top">
      <div class="head"><button id="settingsBtn" class="set">⚙️</button><div class="title">בום של אהבה</div><div></div></div>
      <div class="players"><div id="pc0" class="pc"><span id="pe0"></span><span id="pn0"></span><div id="fx0" class="fx"></div></div><div>VS</div><div id="pc1" class="pc"><span id="pe1"></span><span id="pn1"></span><div id="fx1" class="fx"></div></div></div>
      <div id="turn" class="turn"></div>
    </div>
    <div class="board-wrap"><div id="board" class="board"></div><div id="layer" class="layer"></div><div id="t0" class="tk"></div><div id="t1" class="tk"></div></div>
    <div class="moves"><button id="u" class="mv">↑</button><button id="d" class="mv">↓</button><button id="l" class="mv">←</button><button id="r" class="mv">→</button></div>
  </div>
</section>
<div id="modal" class="modal"><div class="mc"><div id="mi" class="mi"></div><div id="mt" class="mt"></div><div id="mx" class="mx"></div><div id="ma" class="ma"></div></div></div>
<div id="confetti" class="cf"></div><div id="toasts" class="toast-wrap"></div>
<script>
const ROWS=8,COLS=6,START=[7,5],GOAL=[0,0],IC={kiss:"💋",task:"🎯",question:"❔",temptation:"❓",duel:"⚔️",bonus:"🎁",bomb:"💣",goal:"🏆"},EM=["😈","😎","🥵","😘","😜","🫦","😏","😍","🤠","🦊","🔥","⚡","🩷","💫","🍓","🍒"];
const $=id=>document.getElementById(id),board=$("board"),layer=$("layer"),modal=$("modal");
const S={e1:"😈",e2:"😎",board:[],players:[],cur:0,turn:1,busy:false,over:false,pending:null,advance:false,extra:[0,0],forced:[null,null],reverse:[0,0],history:{kiss:[],task:[],question:[],duel:[],tempt:[],bonus:[]},relocateAt:0,relocateWarnAt:0,endgameShown:false,modalVersion:0,duelState:null,stats:{bombs:0,duels:0,risks:0,wow:0}};
const W={m:{give:"תן",do:"עשה",say:"אמור",ask:"שאל",whisper:"לחש",choose:"בחר",look:"הסתכל",describe:"תאר"},f:{give:"תני",do:"עשי",say:"אמרי",ask:"שאלי",whisper:"לחשי",choose:"בחרי",look:"הסתכלי",describe:"תארי"}};
const Audio={ctx:null,muted:false,ensure(){if(this.muted)return null;if(!this.ctx){const C=window.AudioContext||window.webkitAudioContext;if(!C)return null;this.ctx=new C}return this.ctx},setMuted(v){this.muted=v;if(v&&this.ctx&&this.ctx.state==="running")this.ctx.suspend();if(!v&&this.ctx&&this.ctx.state==="suspended")this.ctx.resume()},play(t){const a=this.ensure();if(!a)return;const m={tap:[370,.03],good:[620,.06],bad:[220,.09],bomb:[130,.14],win:[760,.2]}[t]||[420,.05];const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type="sine";o.frequency.value=m[0];g.gain.value=.03;o.start();o.stop(a.currentTime+m[1])}};
const DB=(()=>{const names=["נשיקה איטית","נשיקה מהירה","נשיקה בצוואר","חיבוק צמוד","מבט חם","ריקוד קרוב","לחישה סודית","מחמאה שובבה","עצימת עיניים","נשימת סנכרון"],kiss=[],task=[],question=[],duel=[],tempt=[],bonus=[];for(let i=0;i<60;i++)kiss.push(`{actor}, ${names[i%names.length]}: ${i%2?"20":"12"} שניות מול {target}.`);const ta=["אתגר ריקוד","אתגר חיקוי","אתגר זריזות","אתגר צחוק","אתגר מבטים","אתגר זיכרון","אתגר שיר","אתגר תזמון","אתגר נשימות","אתגר סיפור"];for(let i=0;i<60;i++)task.push(`{actor}, ${ta[i%ta.length]} מספר ${i+1}: בצעו יחד ${15+(i%4)*5} שניות.`);const qa=["מה הכי מושך ב{target}?","איזה זיכרון זוגי היית משחזר/ת?","מה מחמאה שאת/ה צריך/ה עכשיו?","מה היית רוצה לנסות השבוע?","איזה מגע עושה לך טוב?","איך נראה ערב מושלם יחד?","מה מדליק אותך בשפת גוף?","איזה גבול חשוב לך?","מה הדבר הכי מתוק ש{target} עושה?","מה הפתעה שהיית רוצה לקבל?"];for(let i=0;i<60;i++)question.push(`{actor}, ${qa[i%qa.length]}`);const da=["תחרות מבטים 20 שניות","אבן נייר ומספריים הטוב מ-3","ראשון/ה שמונה 10 ערים","אל תצחקו 25 שניות","אסוציאציות מהירות","ראשון/ה שנוגע/ת בחפץ אדום","קרב זיכרון 8 מילים","קרב מחמאות 6 סבבים","קרב חרוזים מהיר","קרב פנטומימה"];for(let i=0;i<60;i++)duel.push(`${da[i%da.length]} • סיבוב ${i+1}`);for(let i=0;i<50;i++)tempt.push({c:`אתגר הימור ${i+1}: השלימו משימה ב-${20+(i%3)*5} שניות`,win:i%3===0?"+2 צעדים":i%3===1?"תור נוסף":"בחירת קלף ליריב/ה",lose:i%2?"-2 צעדים":"תור בונוס ליריב/ה",e:i%3===0?"m2":i%3===1?"extra":"force"});const ba=["חסינות מפצצה אחת","תור נוסף","בחר/י קלף הבא ליריב/ה","הזז/י יריב/ה צעד אחורה","דלג/י על עונש אחד","חשיפת פצצה סמוכה","ג׳קפוט: +2","היפוך תור: היריב/ה שוב","החלפת מקומות","אזהרת פצצה כפולה"];for(let i=0;i<60;i++)bonus.push(ba[i%ba.length]);return{kiss,task,question,duel,tempt,bonus}})();
function toast(t,ms=1500,cls=""){const e=document.createElement("div");e.className="toast"+(cls?(" "+cls):"");e.textContent=t;$("toasts").appendChild(e);setTimeout(()=>{e.style.opacity="0";e.style.transform="translateY(8px)";setTimeout(()=>e.remove(),220)},ms)}
function pop(i,t,x,actions,adv){S.advance=adv;S.modalVersion++;$("mi").textContent=i||"";$("mt").textContent=t||"";$("mx").innerHTML=(x||"").replaceAll("\n","<br>");const ma=$("ma");ma.innerHTML="";actions.forEach((a,j)=>{const b=document.createElement("button");b.className="mb"+(a.kindClass?(" "+a.kindClass):"")+(j&&!a.kindClass?" alt":"");b.textContent=a.t;b.onclick=()=>act(a.k,S.modalVersion);ma.appendChild(b)});modal.classList.add("show")}
function closeModal(){modal.classList.remove("show");requestAnimationFrame(()=>{if(!S.over)updateMoveButtons()})}
function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function fmt(txt){const a=S.players[S.cur],b=S.players[1-S.cur],w=W[a.gender]||W.f;let x=txt.replaceAll("{actor}",a.name).replaceAll("{target}",b.name);Object.keys(w).forEach(k=>x=x.replaceAll("{"+k+"}",w[k]));return x}
function pickNoRepeat(cat){const arr=DB[cat],h=S.history[cat],cand=arr.filter(x=>!h.includes(x));const v=(cand.length?cand:arr)[Math.floor(Math.random()*(cand.length?cand:arr).length)];h.push(v);if(h.length>10)h.shift();return v}
function mkEmoji(id,n){EM.forEach(v=>{const b=document.createElement("button");b.className="emoji"+((n===1?S.e1:S.e2)===v?" sel":"");b.textContent=v;b.onclick=()=>{if(n===1)S.e1=v;else S.e2=v;[...$(id).children].forEach(x=>x.classList.remove("sel"));b.classList.add("sel")};$(id).appendChild(b)})}
mkEmoji("e1",1);mkEmoji("e2",2);
function path(){let r=START[0],c=START[1],p=[[r,c]];while(r!==GOAL[0]||c!==GOAL[1]){if(r>0&&c>0){Math.random()<.56?r--:c--}else if(r>0)r--;else c--;p.push([r,c])}return p}

function buildBoard(){board.innerHTML="";layer.innerHTML="";S.board=[];const safe=new Set(path().map(p=>p.join(",")));for(let r=0;r<ROWS;r++){S.board[r]=[];for(let c=0;c<COLS;c++){const el=document.createElement("div");el.className="cell";if(r===START[0]&&c===START[1])el.classList.add("start");if(r===GOAL[0]&&c===GOAL[1])el.classList.add("goal");board.appendChild(el);const cell={r,c,type:pickType(r,c,safe.has(`${r},${c}`)),reveal:false,el};S.board[r][c]=cell;paint(cell);const s=document.createElement("div");s.dataset.r=r;s.dataset.c=c;layer.appendChild(s)}}}

function triggerWow(fromChaos=false){S.stats.wow++;const list=["sudden_duel","fake_bomb","jackpot","reverse","flash_bombs"],pick=list[Math.floor(Math.random()*list.length)];if(pick==="sudden_duel"){S.forced[S.cur]="duel";toast("⚔️ דואל פתע בתור הקרוב!",1700,"warn")}if(pick==="fake_bomb"){board.classList.add("shake","fog");const b=document.createElement("div");b.className="preview";b.textContent="💥";b.style.left="50%";b.style.top="50%";b.style.transform="translate(-50%,-50%) scale(1.4)";board.appendChild(b);setTimeout(()=>{board.classList.remove("shake","fog");b.remove()},430);Audio.play("bomb");toast("💥 פייק בום! בהלה בלבד",1500,"danger")}if(pick==="jackpot"){moveBySteps(S.cur,2);toast("🎰 ג׳קפוט! +2",1300,"warn")}if(pick==="reverse"){S.reverse[1-S.cur]=1;toast("🌀 כיוון הפוך ליריב/ה",1500,"danger")}if(pick==="flash_bombs"){flashAllHiddenBombs(1.2);toast("👀 כל הפצצות נחשפו לרגע",1500,"warn")}if(fromChaos)Audio.play("bad")}

function relocateBombs(){Audio.play("bad");board.classList.add("shake","fog");setTimeout(()=>board.classList.remove("shake","fog"),620);toast("🌪️ סערת פצצות! המפה זזה...",1600,"danger");const playerPos=new Set(S.players.map(p=>p.pos.join(","))),bombs=[],other=[];for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if((r===START[0]&&c===START[1])||(r===GOAL[0]&&c===GOAL[1]))continue;const cell=S.board[r][c];(cell.type==="bomb"?bombs:other).push(cell)}const moves=Math.min(isEndgame()?3:2,Math.floor(bombs.length/3));for(let i=0;i<moves;i++){const from=bombs.splice(Math.floor(Math.random()*bombs.length),1)[0];const candidates=other.filter(x=>!playerPos.has(`${x.r},${x.c}`)&&!(x.r===GOAL[0]&&x.c===GOAL[1])&&!(x.r===START[0]&&x.c===START[1]));const pool=candidates.length?candidates:other;const to=pool[Math.floor(Math.random()*pool.length)];if(!from||!to)break;from.type="bonus";from.reveal=false;paint(from);to.type="bomb";to.reveal=false;paint(to)}scheduleRelocation()}
async function bombHit(){const p=S.players[S.cur];if(p.shield>0){p.shield--;toast("🛡️ חסינות חסמה פצצה",1200,"warn");Audio.play("good");return}if(p.skip>0){p.skip--;toast("⏭️ דילוג עונש הופעל",1200,"warn");Audio.play("good");return}S.stats.bombs++;if(navigator.vibrate)navigator.vibrate([80,70,120]);Audio.play("bomb");board.classList.add("shake");setTimeout(()=>board.classList.remove("shake"),450);await moveToCoord(S.cur,START[0],START[1]);toast("💥 בום! חזרה להתחלה",1300,"danger");card("💥","בום!","חזרה להתחלה.\nהפצצה נשארת פעילה.")}
async function tileRevealFlow(cell){cell.el.classList.add("glow");await wait(180);cell.el.classList.remove("glow");cell.el.classList.add("flip");setTimeout(()=>cell.el.classList.remove("flip"),340);const pv=document.createElement("span");pv.className="icon preview";pv.textContent=cell.type==="bomb"?"💣":IC[cell.type];cell.el.appendChild(pv);if(cell.type==="bomb"){await wait(760);pv.remove();await bombHit();return}await wait(680);pv.remove();await resolveCell(cell)}
async function resolveCell(cell){
  const forced=S.forced[S.cur];
  if(forced&&cell.type!=="bomb"){cell.type=forced;S.forced[S.cur]=null;toast("🎴 קלף כפוי הופעל",1000)}
  if(cell.type==="bomb"){await bombHit();return}
  cell.reveal=true;paint(cell);
  if(cell.type==="kiss"){card("💋","אינטימיות",fmt(pickNoRepeat("kiss")));return}
  if(cell.type==="task"){card("🎯","אתגר",fmt(pickNoRepeat("task")));return}
  if(cell.type==="question"){card("❔","שאלה",fmt(pickNoRepeat("question")));return}
  if(cell.type==="duel"){startDuel();return}
  if(cell.type==="temptation"){startTemptation();return}
  if(cell.type==="bonus"){
    await applyBonusInline();
    if(!S.over)nextTurn();
    return;
  }

async function applyBonusInline(){const d=pickNoRepeat("bonus"),p=S.players[S.cur],o=S.players[1-S.cur];toast("🎁 בונוס הופעל!",1000,"warn");if(d.includes("חסינות")){p.shield++;toast("🛡️ חסינות נוספה",1000)}if(d.includes("תור נוסף")){S.extra[S.cur]++;toast("⚡ תור נוסף נשמר",1000)}if(d.includes("קלף הבא")){S.forced[1-S.cur]=["kiss","task","question","temptation","duel"][Math.floor(Math.random()*5)];toast("🎴 קלף כפוי ליריב/ה",1000)}if(d.includes("צעד אחורה"))await moveBySteps(1-S.cur,-1);if(d.includes("דלג/י על עונש")){p.skip++;toast("⏭️ דילוג עונש נשמר",1000)}if(d.includes("חשיפת פצצה"))revealNearbyBomb(p.pos);if(d.includes("ג׳קפוט"))await moveBySteps(S.cur,2);if(d.includes("היפוך תור"))S.extra[1-S.cur]++;if(d.includes("החלפת מקומות")){const t=[...p.pos];p.pos=[...o.pos];o.pos=t;await Promise.all([moveToCoord(S.cur,p.pos[0],p.pos[1]),moveToCoord(1-S.cur,o.pos[0],o.pos[1])]);toast("🔄 החלפת מקומות!",1200)}if(d.includes("אזהרת פצצה כפולה"))flashAllHiddenBombs(1);if(Math.random()<.1)triggerWow()}

async function runDuelTapGame(){try{S.pending={k:"duel_tap"};S.duelState={s0:0,s1:0,done:false};if(S.duelTimer)clearTimeout(S.duelTimer);for(const x of["3","2","1","GO"]){$("mx").innerHTML=`<div class="duel-count">${x}</div>`;Audio.play("tap");await wait(410)}const ma=$("ma");if(!ma){abortDuelSafe();return}ma.innerHTML="";$("mx").innerHTML="לחצו מהר! מי שמגיע/ה ל-12 ראשון/ה מנצח/ת";const wrap=document.createElement("div");wrap.className="duel-row";const mk=i=>{const l=document.createElement("div");l.className="duel-line";l.innerHTML=`<div class="duel-name">${S.players[i].name}</div><div class="duel-bar"><div id="df${i}" class="duel-fill"></div></div><div id="ds${i}" class="duel-score">0</div>`;return l};wrap.appendChild(mk(0));wrap.appendChild(mk(1));const b0=document.createElement("button"),b1=document.createElement("button");b0.className="mb good";b1.className="mb good";b0.textContent="Tap!";b1.textContent="Tap!";const redraw=()=>{const ds0=$("ds0"),ds1=$("ds1"),df0=$("df0"),df1=$("df1");if(!ds0||!ds1||!df0||!df1)return;ds0.textContent=S.duelState.s0;ds1.textContent=S.duelState.s1;df0.style.width=Math.min(100,S.duelState.s0/12*100)+"%";df1.style.width=Math.min(100,S.duelState.s1/12*100)+"%"};redraw();const finish=()=>{if(!S.duelState||S.duelState.done)return;if(S.duelState.s0>=12||S.duelState.s1>=12)finishDuel(S.duelState.s0>=12?0:1)};b0.onclick=()=>{if(!S.duelState||S.duelState.done)return;S.duelState.s0++;Audio.play("tap");b0.classList.add("impact");setTimeout(()=>b0.classList.remove("impact"),120);redraw();finish()};b1.onclick=()=>{if(!S.duelState||S.duelState.done)return;S.duelState.s1++;Audio.play("tap");b1.classList.add("impact");setTimeout(()=>b1.classList.remove("impact"),120);redraw();finish()};ma.appendChild(wrap);ma.appendChild(b0);ma.appendChild(b1);S.duelTimer=setTimeout(()=>{if(S.pending&&S.pending.k==="duel_tap"&&S.duelState&&!S.duelState.done){const w=S.duelState.s0===S.duelState.s1?(Math.random()<.5?0:1):(S.duelState.s0>S.duelState.s1?0:1);finishD async function finishDuel(w){if(!S.duelState||S.duelState.done)return;S.duelState.done=true;if(S.duelTimer){clearTimeout(S.duelTimer);S.duelTimer=null}const l=1-w,boost=isEndgame()?3:2,push=isEndgame()?-2:-1;$("mx").innerHTML=`🏅 ${S.players[w].name} ניצח/ה!<br>+${boost} למנצח/ת • ${push} למפסיד/ה`;$("mi").classList.add("impact");setTimeout(()=>$("mi").classList.remove("impact"),240);Audio.play("good");await wait(500);await moveBySteps(w,boost);await moveBySteps(l,push);S.forced[l]=["kiss","task","question","temptation"][Math.floor(Math.random()*4)];toast("⚔️ קלף כפוי למפסיד/ה בתור הבא",1300);S.pending=null;S.duelState=null;closeModal();if(!S.over&&S.advance)nextTurn()}

function confetti(){const f=$("confetti");f.innerHTML="";for(let i=0;i<110;i++){const d=document.createElement("div");d.className="c";d.style.left=Math.random()*100+"vw";d.style.background=["#ff2f7d","#ffd166","#46a3ff","#8cff8c","#fff"][Math.floor(Math.random()*5)];d.style.animationDelay=(Math.random()*.5)+"s";f.appendChild(d)}setTimeout(()=>f.innerHTML="",2500)}
function winScreen(w){const funny=["הלב ניצח, אבל גם המוח עבד פה יפה.","אין פה מזל, רק כימיה מסוכנת.","מישהו פה יודע לשחק… ולפתות."][Math.floor(Math.random()*3)],stats=`<div class="stats"><div class="stat">תורים: ${S.turn}</div><div class="stat">פצצות: ${S.stats.bombs}</div><div class="stat">דואלים: ${S.stats.duels}</div><div class="stat">הימורים: ${S.stats.risks}</div></div>`;pop("",`ניצחון גדול!`,`<div class="trophy-big">🏆</div>${w.name} ניצח/ה<br>תואר זוגי: ${microTitle()}<br>${funny}${stats}`,[{t:"שחקו שוב",k:"restart"}],false);Audio.play("win");confetti()}
async function resolvePending(k){const p=S.players[S.cur],o=S.players[1-S.cur],x=S.pending;if(!x)return false;if(x.k==="tempt"){if(k==="safe"){S.pending=null;toast("🙂 ויתרתם בבטחה",1000);Audio.play("tap");return false}if(k==="risk"){S.pending={k:"tempt2",d:x.d};openSuccessFail();return true}}if(x.k==="tempt2"){const succ=k==="succ";Audio.play(succ?"good":"bad");await applyTemptOutcome(x.d,succ);S.pending=null;if(!S.over)toast(succ?"🔥 הימור הצליח!":"😬 הימור נכשל!",900,succ?"warn":"danger");await wait(180);return false}if(x.k==="duel_intro"&&k==="duelStart"){runDuelTapGame().catch(()=>abortDuelSafe());return true}return false}
async function applyModalAction(k,v){if(v!==S.modalVersion)return;if(k==="restart"){location.reload();return}if(k==="mute"){Audio.setMuted(!Audio.muted);toast(Audio.muted?"🔇 סאונד הושתק":"🔈 סאונד הופעל",900);closeModal();S.busy=false;updateMoveButtons();return}if(k==="help"){pop("ℹ️","עזרה","מטרה: להגיע לגביע.\n❓ הימור עובד בשני שלבים.\n⚔️ דו-קרב מהיר ואינטראקטיבי.\nמצבי אפקטים:\n🛡️ חסינות פצצה\n⏭️ דילוג עונש\n🌀 כיוון הפוך\n⚡ תור נוסף\n⚔️ דואל כפוי\n🎴 קלף כפוי",[{t:"חזרה",k:"resume"}],false);return}if(k==="newGame"){location.reload();return}if(k==="resume"){closeModal();S.busy=false;updateMoveButtons();return}let opened=false;if(S.pending)opened=await resolvePending(k);if(opened)return;closeModal();if(S.over)return;if(S.advance)nextTurn();updateMoveButtons()}
async function moveTurn(dr,dc){if(S.busy||S.over||modal.classList.contains("show"))return;const me=S.cur;let ddr=dr,ddc=dc;if(S.reverse[me]>0){ddr*=-1;ddc*=-1;S.reverse[me]--;toast("🌀 כיוון הפוך הופעל",850,"danger")}const p=S.players[me],nr=p.pos[0]+ddr,nc=p.pos[1]+ddc;if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return;S.busy=true;updateMoveButtons();p.pos=[nr,nc];await animateToken(me,nr,nc);stackTokens();if(checkVictory(me)){S.busy=false;updateMoveButtons();return}await tileRevealFlow(S.board[nr][nc]);S.busy=false;ui()}
function nextTurn(){if(S.turn===S.relocateWarnAt)warnRelocation();if(S.turn===S.relocateAt)relocateBombs();if(S.extra[S.cur]>0){S.extra[S.cur]--;toast("⚡ תור נוסף!",850);S.turn++;ui();return}S.cur=1-S.cur;S.turn++;applyComebackBias();ui();if(Math.random()<(isEndgame()?.11:.045)&&!S.over)triggerWow()}
function startGame(){S.players=[{name:$("n1").value.trim()||"שחקן א",gender:$("g1").value,emoji:S.e1,pos:[...START],shield:0,skip:0},{name:$("n2").value.trim()||"שחקן ב",gender:$("g2").value,emoji:S.e2,pos:[...START],shield:0,skip:0}];S.cur=0;S.turn=1;S.busy=false;S.over=false;S.pending=null;S.advance=false;S.extra=[0,0];S.forced=[null,null];S.reverse=[0,0];S.history={kiss:[],task:[],question:[],duel:[],tempt:[],bonus:[]};S.stats={bombs:0,duels:0,risks:0,wow:0};S.endgameShown=false;S.modalVersion=0;scheduleRelocation();buildBoard();$("start").classList.remove("show");$("game").classList.add("show");ui();placeTokens();pop("💘","מתחילים","פצצות מוסתרות לגמרי עד דריכה.\nלאחר פיצוץ הן נעלמות מהעין ונשארות פעילות.",[{t:"הבנתי",k:"resume"}],false)}
function openSettings(){pop("⚙️","הגדרות","",[{t:Audio.muted?"הפעלת סאונד":"השתקת סאונד",k:"mute"},{t:"עזרה",k:"help"},{t:"משחק חדש",k:"newGame"},{t:"חזרה למשחק",k:"resume"}],false)}
$("startBtn").onclick=startGame;$("settingsBtn").onclick=openSettings;$("u").onclick=()=>moveTurn(-1,0);$("d").onclick=()=>moveTurn(1,0);$("l").onclick=()=>moveTurn(0,-1);$("r").onclick=()=>moveTurn(0,1);
window.addEventListener("pointerdown",()=>Audio.ensure(),{once:true});
function act(k,v){applyModalAction(k,v)}
</script>
